<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asteriskoids — Music Tuner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  color: #ccc;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  padding: 30px;
  max-width: 520px;
}
h1 { color: #FF00FF; font-size: 18px; letter-spacing: 3px; margin-bottom: 4px; }
.subtitle { color: #555; margin-bottom: 24px; font-size: 11px; }

/* Transport */
#transport {
  display: flex; align-items: center; gap: 16px;
  background: #1a1a1a; border: 1px solid #333;
  padding: 12px 16px; border-radius: 6px; margin-bottom: 24px;
}
button {
  background: #222; border: 1px solid #555; color: #eee;
  padding: 7px 18px; border-radius: 4px; cursor: pointer;
  font-family: inherit; font-size: 12px; letter-spacing: 1px;
}
button:hover { border-color: #FF00FF; color: #FF00FF; }
button.active { background: #2a0a2a; border-color: #FF00FF; color: #FF00FF; }
#beat-pos { color: #666; font-size: 11px; }

/* Controls */
.panel {
  background: #1a1a1a; border: 1px solid #2a2a2a;
  border-top: 2px solid #FF00FF;
  border-radius: 6px; padding: 20px; margin-bottom: 20px;
}
.section-title {
  color: #FF00FF; font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; margin: 16px 0 10px;
  border-bottom: 1px solid #222; padding-bottom: 4px;
}
.section-title:first-child { margin-top: 0; }
.ctrl { margin-bottom: 12px; }
.ctrl label {
  display: flex; justify-content: space-between;
  color: #888; font-size: 10px; margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.ctrl label span { color: #eee; font-size: 11px; }
input[type=range] {
  width: 100%; height: 4px; cursor: pointer;
  accent-color: #FF00FF;
}
select {
  width: 100%; background: #222; border: 1px solid #444;
  color: #eee; padding: 5px 8px; border-radius: 3px;
  font-family: inherit; font-size: 12px; cursor: pointer;
}
select:focus { outline: none; border-color: #FF00FF; }

/* Output */
#code-output {
  background: #0d0d0d; border: 1px solid #2a2a2a;
  border-radius: 4px; padding: 12px; font-size: 11px;
  color: #aaa; white-space: pre; overflow-x: auto;
  line-height: 1.6; margin-bottom: 12px;
}
#copy-btn { background: #1a2a1a; border-color: #3CC8A4; color: #3CC8A4; }
#copy-btn:hover { background: #2a3a2a; }
.export-title { color: #3CC8A4; font-size: 11px; letter-spacing: 2px; margin-bottom: 10px; }
</style>
</head>
<body>

<h1>ASTERISK*IDS — MUSIC TUNER</h1>
<div class="subtitle">Debussy: Clair de Lune · All voices</div>

<div id="transport">
  <button id="play-btn" onclick="togglePlay()">▶ PLAY</button>
  <div id="beat-pos">Beat: 0.00 / 216.00</div>
</div>

<div class="panel">

  <div class="section-title">Oscillator</div>
  <div class="ctrl">
    <label>WAVEFORM</label>
    <select id="wave" onchange="p.wave=this.value; updateCode()">
      <option value="sine">sine</option>
      <option value="square" selected>square</option>
      <option value="sawtooth">sawtooth</option>
      <option value="triangle">triangle</option>
    </select>
  </div>
  <div class="ctrl">
    <label>VOLUME <span id="vol-val">0.070</span></label>
    <input type="range" id="vol" min="0.001" max="0.3" step="0.001" value="0.07"
           oninput="p.vol=+this.value; document.getElementById('vol-val').textContent=this.value; updateCode()">
  </div>

  <div class="section-title">Filter</div>
  <div class="ctrl">
    <label>TYPE</label>
    <select id="ftype" onchange="p.ftype=this.value; updateCode()">
      <option value="lowpass" selected>lowpass</option>
      <option value="highpass">highpass</option>
      <option value="bandpass">bandpass</option>
      <option value="notch">notch</option>
    </select>
  </div>
  <div class="ctrl">
    <label>CUTOFF <span id="fcut-val">500 Hz</span></label>
    <input type="range" id="fcut" min="0" max="100" step="0.1" value="55.6"
           oninput="p.fcut=fromLog(+this.value,50,8000); document.getElementById('fcut-val').textContent=Math.round(p.fcut)+' Hz'; updateCode()">
  </div>
  <div class="ctrl">
    <label>Q <span id="fq-val">0.50</span></label>
    <input type="range" id="fq" min="0.1" max="20" step="0.01" value="0.5"
           oninput="p.fq=+this.value; document.getElementById('fq-val').textContent=(+this.value).toFixed(2); updateCode()">
  </div>

  <div class="section-title">Envelope</div>
  <div class="ctrl">
    <label>ATTACK <span id="att-val">0.008s</span></label>
    <input type="range" id="att" min="0.001" max="0.5" step="0.001" value="0.008"
           oninput="p.att=+this.value; document.getElementById('att-val').textContent=(+this.value).toFixed(3)+'s'; updateCode()">
  </div>
  <div class="ctrl">
    <label>DECAY <span id="dec-val">0.100s</span></label>
    <input type="range" id="dec" min="0.001" max="0.5" step="0.001" value="0.1"
           oninput="p.dec=+this.value; document.getElementById('dec-val').textContent=(+this.value).toFixed(3)+'s'; updateCode()">
  </div>
  <div class="ctrl">
    <label>SUSTAIN <span id="sus-val">0.80</span></label>
    <input type="range" id="sus" min="0" max="1" step="0.01" value="0.8"
           oninput="p.sus=+this.value; document.getElementById('sus-val').textContent=(+this.value).toFixed(2); updateCode()">
  </div>
  <div class="ctrl">
    <label>RELEASE <span id="rel-val">0.040s</span></label>
    <input type="range" id="rel" min="0.001" max="0.5" step="0.001" value="0.04"
           oninput="p.rel=+this.value; document.getElementById('rel-val').textContent=(+this.value).toFixed(3)+'s'; updateCode()">
  </div>

</div>

<div class="export-title">EXPORT SETTINGS</div>
<div id="code-output"></div>
<button id="copy-btn" onclick="copyCode()">⧉ COPY TO CLIPBOARD</button>

<script src="cdlune_events.js"></script>
<script>
// Single shared parameter object for all voices
const p = { wave:'square', vol:0.07, ftype:'lowpass', fcut:500, fq:0.5, att:0.008, dec:0.1, sus:0.8, rel:0.04 };

// Per-voice relative volume multipliers (preserve musical balance)
const VOL_MIX = [1.28, 0.57, 0.86, 0.64]; // v0 melody, v1 accomp, v2 bass, v3 inner

function fromLog(pct, min, max) {
  return min * Math.pow(max / min, pct / 100);
}

// ── Audio ─────────────────────────────────────────────────────────────────────
const ac = new AudioContext();
const masterGain = ac.createGain();
masterGain.gain.value = 0.8;
masterGain.connect(ac.destination);

const ml = { running:false, loopStart:0, evIdx:0, timer:null };
const BPS   = CDLUNE_BPS;
const BEATS = CDLUNE_BEATS;
const EVTS  = CDLUNE_EVT;

function schedNote(freq, startTime, durSec, voice) {
  if (!freq) return;
  try {
    const osc  = ac.createOscillator();
    const filt = ac.createBiquadFilter();
    const g    = ac.createGain();
    osc.type = p.wave;
    osc.frequency.value = freq;
    filt.type = p.ftype;
    filt.frequency.value = p.fcut;
    filt.Q.value = p.fq;
    const pk  = p.vol * (VOL_MIX[voice] ?? 1);
    const sus = pk * p.sus;
    const t   = startTime;
    const relStart = Math.max(t + p.att + p.dec, t + durSec - p.rel);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(pk,  t + p.att);
    g.gain.linearRampToValueAtTime(sus, t + p.att + p.dec);
    g.gain.setValueAtTime(sus, relStart);
    g.gain.linearRampToValueAtTime(0, relStart + p.rel);
    osc.connect(filt); filt.connect(g); g.connect(masterGain);
    osc.start(t); osc.stop(relStart + p.rel + 0.02);
  } catch(e) {}
}

function tick() {
  if (!ml.running) return;
  const now = ac.currentTime;
  if (ml.loopStart === 0) ml.loopStart = now;
  for (let guard = 0; guard < 500; guard++) {
    if (ml.evIdx >= EVTS.length) { ml.loopStart += BEATS / BPS; ml.evIdx = 0; }
    const [bs, bd, hz, voice] = EVTS[ml.evIdx];
    const evTime = ml.loopStart + bs / BPS;
    if (evTime > now + 0.35) break;
    schedNote(hz, Math.max(evTime, now), bd / BPS * 0.92, voice);
    ml.evIdx++;
  }
  document.getElementById('beat-pos').textContent =
    `Beat: ${(((ac.currentTime - ml.loopStart) * BPS) % BEATS).toFixed(2)} / ${BEATS.toFixed(2)}`;
  ml.timer = setTimeout(tick, 80);
}

function togglePlay() {
  if (ac.state === 'suspended') ac.resume();
  const btn = document.getElementById('play-btn');
  if (ml.running) {
    ml.running = false; clearTimeout(ml.timer);
    btn.textContent = '▶ PLAY'; btn.classList.remove('active');
  } else {
    ml.running = true; ml.loopStart = 0; ml.evIdx = 0;
    btn.textContent = '⏹ STOP'; btn.classList.add('active');
    tick();
  }
}

// ── Export ────────────────────────────────────────────────────────────────────
function updateCode() {
  const vols = VOL_MIX.map(m => (p.vol * m).toFixed(4));
  document.getElementById('code-output').textContent =
`// In asteriskoids.html — replace _VOL, _FCUT, and update _musicNote:

const _VOL  = [${vols.join(', ')}];
const _FCUT = [${[0,1,2,3].map(()=>Math.round(p.fcut)).join(', ')}];

// In _musicNote(), set:
//   osc.type      = '${p.wave}';
//   filt.type     = '${p.ftype}';
//   filt.Q.value  = ${p.fq.toFixed(2)};
//   attack        = ${p.att.toFixed(3)}
//   decay         = ${p.dec.toFixed(3)}
//   sustain       = ${p.sus.toFixed(2)}
//   release       = ${p.rel.toFixed(3)}`;
}

function copyCode() {
  navigator.clipboard.writeText(document.getElementById('code-output').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ COPIED!';
    setTimeout(() => btn.textContent = '⧉ COPY TO CLIPBOARD', 2000);
  });
}

updateCode();
</script>
</body>
</html>
