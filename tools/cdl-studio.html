<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CdL FANFARE STUDIO</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #07070f;
    --panel:   #0f0f1e;
    --border:  #2a1a4a;
    --accent:  #cc44ff;
    --accent2: #44ccff;
    --text:    #e0d0ff;
    --dim:     #7060a0;
    --hot:     #ff44cc;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: var(--dim);
    letter-spacing: 2px;
    font-size: 11px;
    margin-bottom: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card-header { display: flex; align-items: baseline; gap: 10px; }
  .card-letter {
    font-size: 28px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
    min-width: 24px;
  }
  .card-title { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--text); }
  .card-desc { color: var(--dim); font-size: 11px; letter-spacing: 1px; line-height: 1.6; }

  /* Variation buttons */
  .vars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .var-btn {
    background: #1a0a2e;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 4px 6px;
    cursor: pointer;
    text-align: center;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .var-btn:hover { border-color: var(--accent); background: #2a0a4a; }
  .var-btn.active { border-color: var(--accent); background: #3a0a6a; color: var(--accent); }
  .var-btn.playing { border-color: var(--hot); color: var(--hot); background: #3a0020; animation: pulse 0.4s ease infinite alternate; }
  .var-num { font-size: 16px; font-weight: bold; color: var(--accent); }
  .var-btn.playing .var-num { color: var(--hot); }
  @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }

  /* Controls */
  .controls { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .controls summary {
    background: #1a0a2e;
    padding: 6px 10px;
    cursor: pointer;
    letter-spacing: 2px;
    font-size: 10px;
    text-transform: uppercase;
    color: var(--dim);
    user-select: none;
  }
  .controls summary:hover { color: var(--text); }
  .controls[open] summary { color: var(--accent2); border-bottom: 1px solid var(--border); }
  .controls-body {
    padding: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
  .ctrl-group.full { grid-column: 1 / -1; }
  .ctrl-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .ctrl-val { color: var(--accent2); font-size: 11px; }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    height: 18px;
    cursor: pointer;
  }
  .wave-btns { display: flex; gap: 4px; }
  .wave-btn {
    flex: 1;
    background: #1a0a2e;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--dim);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 4px 2px;
    cursor: pointer;
    text-align: center;
    text-transform: uppercase;
    transition: all 0.1s;
  }
  .wave-btn.active { border-color: var(--accent2); color: var(--accent2); background: #0a1a2e; }
  .octave-btns { display: flex; gap: 3px; align-items: center; }
  .oct-btn {
    background: #1a0a2e;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--dim);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    padding: 2px 7px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .oct-btn.active { border-color: var(--accent); color: var(--accent); background: #2a0a4a; }

  /* Footer row */
  .card-footer { display: flex; gap: 8px; align-items: center; }
  .export-btn {
    background: #0a1a0a;
    border: 1px solid #2a4a2a;
    border-radius: 4px;
    color: #44ff88;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.1s;
    margin-left: auto;
  }
  .export-btn:hover { background: #1a3a1a; border-color: #44ff88; }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #0f0f1e;
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 20px;
    max-width: 640px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
  }
  .modal h2 { color: var(--accent); letter-spacing: 4px; font-size: 13px; margin-bottom: 12px; }
  pre {
    background: #07070f;
    border: 1px solid #2a1a4a;
    border-radius: 4px;
    padding: 12px;
    font-size: 11px;
    line-height: 1.7;
    color: #a0d0ff;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-x: auto;
  }
  .modal-btns { display: flex; gap: 8px; margin-top: 12px; }
  .modal-close {
    background: #1a0a2e; border: 1px solid var(--border); border-radius: 4px;
    color: var(--dim); font-family: 'Courier New', monospace; font-size: 11px;
    letter-spacing: 2px; padding: 6px 14px; cursor: pointer; text-transform: uppercase;
  }
  .modal-copy {
    background: #0a1a0a; border: 1px solid #2a4a2a; border-radius: 4px;
    color: #44ff88; font-family: 'Courier New', monospace; font-size: 11px;
    letter-spacing: 2px; padding: 6px 14px; cursor: pointer; text-transform: uppercase;
  }
  .modal-copy:hover { background: #1a3a1a; border-color: #44ff88; }
</style>
</head>
<body>

<h1>CdL Fanfare Studio</h1>
<p class="subtitle">Four approaches to Clair de Lune harmonics — 4 variations each</p>

<div class="grid" id="grid"></div>

<!-- Code modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modal-title">EXPORTED CODE</h2>
    <pre id="modal-code"></pre>
    <div class="modal-btns">
      <button class="modal-copy" id="modal-copy-btn" onclick="copyCode()">COPY</button>
      <button class="modal-close" onclick="closeModal()">CLOSE</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  AUDIO ENGINE
// ─────────────────────────────────────────────
let _ac = null;
function audio() {
  if (!_ac) _ac = new AudioContext();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

function makeIR(ctx, dur = 2.2, decay = 2.0) {
  const len = Math.ceil(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  return buf;
}

let _irBuf = null;
function getIR() {
  if (!_irBuf) _irBuf = makeIR(audio());
  return _irBuf;
}

function playVariation(notes, ctrl) {
  const ac = audio();
  const t0 = ac.currentTime + 0.04;
  const octMul = Math.pow(2, ctrl.octave);

  // Master gain
  const masterGain = ac.createGain();
  masterGain.gain.value = 0.72;
  masterGain.connect(ac.destination);

  // Reverb
  let reverbOut = masterGain;
  if (ctrl.reverb > 0.01) {
    const conv = ac.createConvolver();
    conv.buffer = getIR();
    const wet = ac.createGain();
    const dry = ac.createGain();
    wet.gain.value = ctrl.reverb;
    dry.gain.value = 1.0 - ctrl.reverb * 0.5;
    conv.connect(wet); wet.connect(masterGain);
    dry.connect(masterGain);
    // We'll route through a splitter
    const split = ac.createGain();
    split.gain.value = 1;
    split.connect(dry);
    split.connect(conv);
    reverbOut = split;
  }

  const voiceVols = [0.22, 0.13, 0.16, 0.18];

  notes.forEach(({ hz, start, dur, voice }) => {
    const freq = hz * octMul;
    const startT = t0 + start;
    const pk = voiceVols[voice] ?? 0.14;
    const sus = pk * ctrl.sustain;

    try {
      const osc = ac.createOscillator();
      const filt = ac.createBiquadFilter();
      const g = ac.createGain();

      osc.type = ctrl.wave;
      osc.frequency.value = freq;
      filt.type = 'lowpass';
      filt.frequency.value = ctrl.lpf;
      filt.Q.value = 0.5;

      const att = ctrl.attack;
      const dec = ctrl.decay;
      const rel = ctrl.release;
      const relStart = Math.max(startT + att + dec, startT + dur - rel);

      g.gain.setValueAtTime(0, startT);
      g.gain.linearRampToValueAtTime(pk, startT + att);
      g.gain.linearRampToValueAtTime(sus, startT + att + dec);
      g.gain.setValueAtTime(sus, relStart);
      g.gain.linearRampToValueAtTime(0, relStart + rel);

      osc.connect(filt); filt.connect(g); g.connect(reverbOut);
      osc.start(startT);
      osc.stop(relStart + rel + 0.05);
    } catch(e) {}
  });

  // Return total duration
  return Math.max(...notes.map(n => n.start + n.dur)) + ctrl.release + 0.1;
}

function generateCode(optionKey, varIdx, ctrl) {
  const opt = OPTIONS.find(o => o.id === optionKey);
  const vr = opt.variations[varIdx];
  const octMul = Math.pow(2, ctrl.octave);
  const bps = 'CDLUNE_BPS';
  // We'll output raw seconds * bps for beat notation, or just raw seconds
  // Actually let's output using the _fanfareNote helper directly with raw hz and seconds
  const lines = vr.notes.map(({hz, start, dur, voice}) => {
    const f = (hz * octMul).toFixed(4);
    return `    [${start.toFixed(3)}, ${dur.toFixed(3)}, ${f}, ${voice}]`;
  });
  return `// Option ${optionKey} · ${vr.name}
// Wave: ${ctrl.wave} | Octave: ${ctrl.octave > 0 ? '+' : ''}${ctrl.octave}
// Attack:${ctrl.attack.toFixed(3)} Decay:${ctrl.decay.toFixed(3)} Sus:${ctrl.sustain.toFixed(2)} Rel:${ctrl.release.toFixed(2)}
// LPF: ${ctrl.lpf.toFixed(0)} Hz | Reverb: ${(ctrl.reverb*100).toFixed(0)}%
function playFanfare_${optionKey}${varIdx + 1}() {
  const a = audio(), t0 = a.currentTime + 0.04;
  [
${lines.join(',\n')}
  ].forEach(([start, dur, hz, voice]) => _fanfareNote(hz, t0 + start, dur, voice));
}`;
}

// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const OPTIONS = [
  {
    id: 'A',
    title: 'Dreamy Chord Stacks',
    desc: 'Two rich chords dissolve into each other — Db major with added 9ths and 11ths, washed in reverb. Pure mood, no melody. The "impressionist haze" approach.',
    variations: [
      {
        name: 'Simple Arc',
        notes: [
          {hz:277.18, start:0,   dur:1.8,  voice:0},  // Db4

          {hz:415.30, start:0,   dur:1.8,  voice:2},  // Ab4
          {hz:369.99, start:1.4, dur:2.0,  voice:0},  // Gb4
          {hz:466.16, start:1.4, dur:2.0,  voice:1},  // Bb4
          {hz:554.37, start:1.4, dur:2.0,  voice:2},  // Db5
        ]
      },

          {hz:622.25, start:0,   dur:1.6,  voice:1},  // Eb5 (9th)
          {hz:415.30, start:1.3, dur:2.0,  voice:0},  // Ab4
          {hz:622.25, start:1.3, dur:2.0,  voice:1},  // Eb5

          {hz:466.16, start:0,   dur:1.5,  voice:1},  // Bb4
          {hz:277.18, start:1.2, dur:2.2,  voice:3},  // Db4
          {hz:349.23, start:1.2, dur:2.2,  voice:0},  // F4
          {hz:415.30, start:1.2, dur:2.2,  voice:1},  // Ab4
          {hz:554.37, start:1.2, dur:2.2,  voice:2},  // Db5
        ]
      },
      {
        name: 'High Pedal',

          {hz:277.18, start:0,   dur:1.8,  voice:3},  // Db4 bass
          {hz:415.30, start:0,   dur:1.8,  voice:0},  // Ab4
          {hz:554.37, start:0,   dur:3.5,  voice:1},  // Db5 pedal
          {hz:622.25, start:0,   dur:3.5,  voice:2},  // Eb5 9th pedal
          {hz:369.99, start:1.4, dur:2.0,  voice:3},  // Gb4

  },
  {
    id: 'B',
    title: 'Triplet Flourish',
    desc: 'CdL\'s defining gesture: a rapid 3-note arpeggiated sweep (like a harp glissando) landing on a sustained chord. Motion without literal melody.',
    variations: [
      {
        name: 'Low Sweep',
        notes: [
          {hz:207.65, start:0,    dur:0.12, voice:0},  // Ab3
          {hz:277.18, start:0.12, dur:0.12, voice:0},  // Db4
          {hz:349.23, start:0.24, dur:0.12, voice:0},  // F4
          {hz:277.18, start:0.36, dur:2.0,  voice:0},  // Db4 chord
          {hz:349.23, start:0.36, dur:2.0,  voice:1},  // F4
          {hz:415.30, start:0.36, dur:2.0,  voice:2},  // Ab4
        ]
      },

    variations: [
      {

          {hz:277.18, start:0,    dur:0.85, voice:3},  // Db chord
          {hz:415.30, start:0,    dur:0.85, voice:0},

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const state = {};
OPTIONS.forEach(opt => {
  state[opt.id] = {
    octave:  0,
    wave:   'square',
    attack:  0.008,
    decay:   0.14,
    sustain: 0.50,
    release: 0.55,
    lpf:     1100,
    reverb:  0.40,
    activeVar: null,
    playTimer: null,
  };
});

// ─────────────────────────────────────────────
//  BUILD UI
// ─────────────────────────────────────────────
const grid = document.getElementById('grid');

OPTIONS.forEach(opt => {
  const s = state[opt.id];
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${opt.id}`;

  // Header
  card.innerHTML = `
    <div class="card-header">
      <span class="card-letter">${opt.id}</span>
      <span class="card-title">${opt.title}</span>
    </div>
    <p class="card-desc">${opt.desc}</p>

    <div class="vars" id="vars-${opt.id}">
      ${opt.variations.map((v, i) => `
        <button class="var-btn" id="vbtn-${opt.id}-${i}" onclick="triggerPlay('${opt.id}', ${i})">
          <span class="var-num">${i + 1}</span>
          <span>${v.name}</span>
        </button>
      `).join('')}
    </div>

    <details class="controls" id="ctrl-${opt.id}">
      <summary>Sound Controls</summary>
      <div class="controls-body">

        <div class="ctrl-group full">
          <div class="ctrl-label"><span>OCTAVE</span></div>
          <div class="octave-btns" id="oct-${opt.id}">
            ${[-2,-1,0,1,2].map(o => `
              <button class="oct-btn ${o===0?'active':''}" onclick="setOctave('${opt.id}',${o})">${o>=0?'+':''}${o}</button>
            `).join('')}
          </div>
        </div>

        <div class="ctrl-group full">
          <div class="ctrl-label"><span>WAVEFORM</span></div>
          <div class="wave-btns" id="wave-${opt.id}">
            ${['sine','square','sawtooth','triangle'].map(w => `
              <button class="wave-btn ${w==='square'?'active':''}" onclick="setWave('${opt.id}','${w}')">${w === 'sawtooth' ? 'saw' : w}</button>
            `).join('')}
          </div>
        </div>

        <div class="ctrl-group">
          <div class="ctrl-label"><span>ATTACK</span><span class="ctrl-val" id="val-atk-${opt.id}">0.008s</span></div>
          <input type="range" min="0.001" max="0.4" step="0.001" value="0.008"
            oninput="setCtrl('${opt.id}','attack',+this.value,'val-atk-${opt.id}',v=>v.toFixed(3)+'s')">
        </div>
        <div class="ctrl-group">
          <div class="ctrl-label"><span>DECAY</span><span class="ctrl-val" id="val-dec-${opt.id}">0.140s</span></div>
          <input type="range" min="0.02" max="0.6" step="0.01" value="0.14"
            oninput="setCtrl('${opt.id}','decay',+this.value,'val-dec-${opt.id}',v=>v.toFixed(3)+'s')">
        </div>
        <div class="ctrl-group">
          <div class="ctrl-label"><span>SUSTAIN</span><span class="ctrl-val" id="val-sus-${opt.id}">50%</span></div>
          <input type="range" min="0" max="1" step="0.01" value="0.50"
            oninput="setCtrl('${opt.id}','sustain',+this.value,'val-sus-${opt.id}',v=>Math.round(v*100)+'%')">
        </div>
        <div class="ctrl-group">
          <div class="ctrl-label"><span>RELEASE</span><span class="ctrl-val" id="val-rel-${opt.id}">0.55s</span></div>
          <input type="range" min="0.05" max="2.5" step="0.05" value="0.55"
            oninput="setCtrl('${opt.id}','release',+this.value,'val-rel-${opt.id}',v=>v.toFixed(2)+'s')">
        </div>

        <div class="ctrl-group">
          <div class="ctrl-label"><span>LP FILTER</span><span class="ctrl-val" id="val-lpf-${opt.id}">1100Hz</span></div>
          <input type="range" min="300" max="8000" step="50" value="1100"
            oninput="setCtrl('${opt.id}','lpf',+this.value,'val-lpf-${opt.id}',v=>Math.round(v)+'Hz')">
        </div>
        <div class="ctrl-group">
          <div class="ctrl-label"><span>REVERB</span><span class="ctrl-val" id="val-rev-${opt.id}">40%</span></div>
          <input type="range" min="0" max="1" step="0.02" value="0.40"
            oninput="setCtrl('${opt.id}','reverb',+this.value,'val-rev-${opt.id}',v=>Math.round(v*100)+'%')">
        </div>

      </div>
    </details>

    <div class="card-footer">
      <button class="export-btn" onclick="exportCode('${opt.id}')">EXPORT CODE</button>
    </div>
  `;

  grid.appendChild(card);
});

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function setCtrl(optId, key, val, labelId, fmt) {
  state[optId][key] = val;
  document.getElementById(labelId).textContent = fmt(val);
}

function setOctave(optId, oct) {
  state[optId].octave = oct;
  document.querySelectorAll(`#oct-${optId} .oct-btn`).forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === oct || (oct===0 && b.textContent==='+0') || b.textContent === (oct >= 0 ? '+'+oct : ''+oct));
  });
}

function setWave(optId, wave) {
  state[optId].wave = wave;
  document.querySelectorAll(`#wave-${optId} .wave-btn`).forEach(b => {
    const bWave = b.textContent === 'saw' ? 'sawtooth' : b.textContent;
    b.classList.toggle('active', bWave === wave);
  });
}

function triggerPlay(optId, varIdx) {
  const s = state[optId];
  // Clear previous play timer
  if (s.playTimer) clearTimeout(s.playTimer);

  // Update button states
  document.querySelectorAll(`#vars-${optId} .var-btn`).forEach((b, i) => {
    b.classList.remove('active', 'playing');
    if (i === varIdx) b.classList.add('playing');
  });
  s.activeVar = varIdx;

  const opt = OPTIONS.find(o => o.id === optId);
  const totalDur = playVariation(opt.variations[varIdx].notes, s);

  s.playTimer = setTimeout(() => {
    document.querySelectorAll(`#vars-${optId} .var-btn`).forEach((b, i) => {
      b.classList.remove('playing');
      if (i === varIdx) b.classList.add('active');
    });
  }, totalDur * 1000);
}

function exportCode(optId) {
  const s = state[optId];
  const varIdx = s.activeVar ?? 0;
  const code = generateCode(optId, varIdx, s);
  document.getElementById('modal-title').textContent =
    `OPTION ${optId} · VAR ${varIdx + 1} CODE`;
  document.getElementById('modal-code').textContent = code;
  document.getElementById('modal').classList.add('open');
}

function copyCode() {
  const text = document.getElementById('modal-code').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('modal-copy-btn');
    btn.textContent = 'COPIED!';
    setTimeout(() => { btn.textContent = 'COPY'; }, 1500);
  });
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  // Keyboard shortcuts: A1-A4, B1-B4, C1-C4, D1-D4
  const m = e.key.match(/^([ABCD])([1234])$/i);
  if (m) triggerPlay(m[1].toUpperCase(), parseInt(m[2]) - 1);
});
</script>
