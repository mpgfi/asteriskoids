<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASTER*IDS — Fire SFX Soundboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #08080e;
    color: #ccc;
    font-family: monospace;
    padding: 28px 20px 40px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    color: #ff9620;
    font-size: 15px;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .sub {
    text-align: center;
    color: #555;
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 28px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 7px;
    max-width: 960px;
    margin: 0 auto 28px;
  }
  button {
    background: #111118;
    border: 1px solid #2a2a3a;
    color: #888;
    font-family: monospace;
    font-size: 9.5px;
    line-height: 1.45;
    padding: 11px 5px 10px;
    cursor: pointer;
    border-radius: 3px;
    transition: border-color 0.08s, color 0.08s, background 0.08s;
    text-align: center;
    user-select: none;
  }
  button:hover { border-color: #ff9620; color: #ff9620; }
  button.flash {
    background: #ff9620;
    color: #000;
    border-color: #ff9620;
  }
  .num {
    display: block;
    font-size: 8px;
    color: #444;
    margin-bottom: 3px;
    letter-spacing: 1px;
  }
  button.flash .num { color: #000; }
  .footer {
    text-align: center;
    color: #444;
    font-size: 9px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<h1>FIRE SFX SOUNDBOARD</h1>
<p class="sub">click any button · rapid-fire friendly · 32 variations</p>

<div class="grid" id="grid"></div>
<p class="footer">all sounds synthesised via web audio api</p>

<script>
let ctx = null;
function audio() {
  if (!ctx) ctx = new AudioContext();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

// Pitched oscillator with exponential sweep
function sw(a, type, f0, f1, t, dur, vol) {
  const o = a.createOscillator();
  const g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  if (f1 && f1 !== f0) o.frequency.exponentialRampToValueAtTime(f1, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.02);
}

// Filtered noise burst
function ns(a, t, dur, vol, lp, hp) {
  const len = Math.ceil(a.sampleRate * (dur + 0.02));
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = a.createBufferSource();
  src.buffer = buf;
  let node = src;
  if (lp) {
    const f = a.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = lp;
    node.connect(f); node = f;
  }
  if (hp) {
    const f = a.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = hp;
    node.connect(f); node = f;
  }
  const g = a.createGain();
  node.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.start(t); src.stop(t + dur + 0.02);
}

// Oscillator with custom frequency envelope (array of [time, freq] pairs)
function swEnv(a, type, env, t, dur, vol) {
  const o = a.createOscillator();
  const g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type = type;
  o.frequency.setValueAtTime(env[0][1], t);
  for (let i = 1; i < env.length; i++)
    o.frequency.exponentialRampToValueAtTime(env[i][1], t + env[i][0]);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.02);
}

// Bandpass filtered oscillator
function bp(a, type, f0, f1, bpFreq, Q, t, dur, vol) {
  const o = a.createOscillator();
  const filt = a.createBiquadFilter();
  const g = a.createGain();
  o.connect(filt); filt.connect(g); g.connect(a.destination);
  filt.type = 'bandpass'; filt.frequency.value = bpFreq; filt.Q.value = Q;
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  if (f1) o.frequency.exponentialRampToValueAtTime(f1, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.02);
}

const sounds = [
  // ── PEW FAMILY ──────────────────────────────────────────────────────────
  {
    name: 'Classic Pew',
    fn: (a, t) => sw(a, 'sine', 820, 190, t, 0.080, 0.13)
  },
  {
    name: 'Fat Pew',
    fn: (a, t) => { sw(a, 'sawtooth', 580, 140, t, 0.095, 0.07); ns(a, t, 0.04, 0.03, 700); }
  },
  {
    name: 'Soft Pew',
    fn: (a, t) => sw(a, 'triangle', 720, 200, t, 0.090, 0.12)
  },
  {
    name: 'Tiny Pew',
    fn: (a, t) => sw(a, 'sine', 1100, 420, t, 0.050, 0.10)
  },

  // ── ZAP FAMILY ──────────────────────────────────────────────────────────
  {
    name: 'Sharp Zap',
    fn: (a, t) => { sw(a, 'square', 1200, 380, t, 0.055, 0.06); ns(a, t, 0.025, 0.05, 3500, 900); }
  },
  {
    name: 'Square Zap',
    fn: (a, t) => sw(a, 'square', 880, 200, t, 0.070, 0.07)
  },
  {
    name: 'Hard Zap',
    fn: (a, t) => { sw(a, 'square', 1400, 500, t, 0.060, 0.06); ns(a, t, 0.03, 0.06, 4000, 1200); }
  },
  {
    name: 'Hollow Zap',
    fn: (a, t) => bp(a, 'sawtooth', 900, 200, 500, 5, t, 0.08, 0.16)
  },

  // ── PLASMA FAMILY ────────────────────────────────────────────────────────
  {
    name: 'Plasma A',
    fn: (a, t) => { sw(a, 'sawtooth', 620, 120, t, 0.095, 0.07); ns(a, t, 0.065, 0.045, 900); }
  },
  {
    name: 'Plasma B',
    fn: (a, t) => { sw(a, 'sine', 520, 100, t, 0.100, 0.09); ns(a, t, 0.080, 0.05, 1300, 200); }
  },
  {
    name: 'Plasma C',
    fn: (a, t) => { sw(a, 'triangle', 680, 145, t, 0.095, 0.08); ns(a, t, 0.055, 0.04, 650, 120); }
  },
  {
    name: 'Plasma D',
    fn: (a, t) => { sw(a, 'sine', 615, 138, t, 0.100, 0.07); sw(a, 'sine', 592, 125, t, 0.100, 0.06); }
  },

  // ── CHIRP FAMILY ─────────────────────────────────────────────────────────
  {
    name: 'Chirp Up',
    fn: (a, t) => sw(a, 'sine', 200, 920, t, 0.065, 0.11)
  },
  {
    name: 'Chirp Down',
    fn: (a, t) => sw(a, 'sine', 1050, 260, t, 0.060, 0.10)
  },
  {
    name: 'Double Chirp',
    fn: (a, t) => { sw(a, 'sine', 800, 300, t, 0.042, 0.09); sw(a, 'sine', 950, 380, t + 0.038, 0.042, 0.08); }
  },
  {
    name: 'Wobble Shot',
    fn: (a, t) => swEnv(a, 'sine', [[0, 620], [0.030, 820], [0.090, 190]], t, 0.090, 0.12)
  },

  // ── NOISE FAMILY ─────────────────────────────────────────────────────────
  {
    name: 'Fizz',
    fn: (a, t) => ns(a, t, 0.060, 0.10, 5000, 2200)
  },
  {
    name: 'Gravel',
    fn: (a, t) => ns(a, t, 0.070, 0.09, 1300, 420)
  },
  {
    name: 'Snap',
    fn: (a, t) => ns(a, t, 0.028, 0.13, 3200, 1100)
  },
  {
    name: 'Thump',
    fn: (a, t) => { sw(a, 'sine', 340, 52, t, 0.090, 0.13); ns(a, t, 0.030, 0.06, 700); }
  },

  // ── DIGITAL / RETRO ──────────────────────────────────────────────────────
  {
    name: 'Bit Blip',
    fn: (a, t) => sw(a, 'square', 660, 220, t, 0.060, 0.07)
  },
  {
    name: 'Retro Gun',
    fn: (a, t) => sw(a, 'square', 440, 110, t, 0.080, 0.08)
  },
  {
    name: 'Digital Tap',
    fn: (a, t) => { sw(a, 'square', 820, 820, t, 0.028, 0.07); sw(a, 'square', 410, 100, t + 0.022, 0.050, 0.06); }
  },
  {
    name: 'Glitch',
    fn: (a, t) => {
      const freqs = [480, 760, 340, 920];
      freqs.forEach((f, i) => sw(a, 'square', f, f * 0.4, t + i * 0.013, 0.012, 0.06));
    }
  },

  // ── WARM / MELLOW ────────────────────────────────────────────────────────
  {
    name: 'Warm Shot',
    fn: (a, t) => { sw(a, 'sine', 460, 78, t, 0.120, 0.10); ns(a, t, 0.040, 0.03, 620); }
  },
  {
    name: 'Mellow Zap',
    fn: (a, t) => sw(a, 'triangle', 560, 98, t, 0.110, 0.10)
  },
  {
    name: 'Round Blip',
    fn: (a, t) => { sw(a, 'sine', 720, 260, t, 0.085, 0.09); sw(a, 'sine', 360, 130, t, 0.085, 0.05); }
  },
  {
    name: 'Smooth Arc',
    fn: (a, t) => sw(a, 'sine', 940, 165, t, 0.130, 0.08)
  },

  // ── SPECIAL ──────────────────────────────────────────────────────────────
  {
    name: 'Resonant',
    fn: (a, t) => bp(a, 'sawtooth', 720, 195, 580, 9, t, 0.090, 0.18)
  },
  {
    name: 'Phased',
    fn: (a, t) => {
      const o = a.createOscillator(), lfo = a.createOscillator();
      const lfoG = a.createGain(), g = a.createGain();
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      o.connect(g); g.connect(a.destination);
      o.type = 'sine'; lfo.type = 'sine';
      o.frequency.setValueAtTime(620, t);
      o.frequency.exponentialRampToValueAtTime(175, t + 0.09);
      lfo.frequency.value = 45; lfoG.gain.value = 90;
      g.gain.setValueAtTime(0.11, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
      o.start(t); lfo.start(t); o.stop(t + 0.11); lfo.stop(t + 0.11);
    }
  },
  {
    name: 'Stutter',
    fn: (a, t) => {
      for (let i = 0; i < 4; i++)
        sw(a, 'sine', 700 - i * 65, 200 - i * 20, t + i * 0.017, 0.016, 0.10 - i * 0.018);
    }
  },
  {
    name: 'Punch',
    fn: (a, t) => { sw(a, 'sine', 310, 58, t, 0.075, 0.14); ns(a, t, 0.022, 0.09, 2200, 600); }
  },
];

// Game cannon fires every 5 frames @ 60 fps = 83 ms
const FIRE_INTERVAL = 83;
let holdInterval = null;
let activeBtn = null;

function stopHold() {
  clearInterval(holdInterval);
  holdInterval = null;
  if (activeBtn) { activeBtn.classList.remove('flash'); activeBtn = null; }
}

// Build grid
const grid = document.getElementById('grid');
sounds.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.innerHTML = `<span class="num">${String(i + 1).padStart(2, '0')}</span>${s.name}`;

  btn.addEventListener('mousedown', (e) => {
    e.preventDefault();
    stopHold();
    activeBtn = btn;
    const fire = () => {
      const a = audio();
      s.fn(a, a.currentTime);
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 70);
    };
    fire(); // immediate first shot
    holdInterval = setInterval(fire, FIRE_INTERVAL);
  });

  grid.appendChild(btn);
});

document.addEventListener('mouseup', stopHold);
document.addEventListener('mouseleave', stopHold);
</script>
</body>
</html>
