<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASTER*IDS — Sound FX Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; min-height: 100%;
  background: #0c0c0c;
  color: #ccc;
  font-family: 'Courier New', monospace;
}
header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #1c1c1c;
  display: flex;
  align-items: baseline;
  gap: 14px;
}
header h1 { font-size: 13px; letter-spacing: 6px; color: #8844CC; font-weight: normal; }
header span { font-size: 9px; letter-spacing: 4px; color: #3a3a3a; }

section { margin: 22px 20px; }
.section-heading {
  font-size: 8px; letter-spacing: 5px; color: #50BAB4;
  margin-bottom: 14px; padding-bottom: 7px;
  border-bottom: 1px solid #1a1a1a;
}
.card-grid { display: flex; flex-wrap: wrap; gap: 10px; }

/* ── Card ── */
.card {
  background: #131313; border: 1px solid #1e1e1e;
  border-radius: 6px; padding: 13px; width: 218px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.card.playing {
  border-color: #6060aa;
  box-shadow: 0 0 10px rgba(100,80,180,0.18);
}
.card-name { font-size: 10px; letter-spacing: 3px; color: #eee; margin-bottom: 3px; }
.card-desc { font-size: 8px; color: #484848; margin-bottom: 11px; line-height: 1.5; letter-spacing: 0.3px; }

/* Play button */
.btn-play {
  width: 100%; padding: 7px 0;
  background: #181818; border: 1px solid #2e2e2e;
  border-radius: 4px; color: #3CC8A4;
  font-family: inherit; font-size: 10px; letter-spacing: 3px;
  cursor: pointer; margin-bottom: 11px;
  transition: background 0.1s, border-color 0.1s;
}
.btn-play:hover { background: #1e1e1e; border-color: #3CC8A4; }
.btn-play:active { background: #112420; }

/* Waveform */
.ctrl-label {
  display: block; font-size: 8px; letter-spacing: 2px;
  color: #444; margin-top: 9px; margin-bottom: 4px;
}
.wave-row { display: flex; gap: 3px; }
.btn-wave {
  flex: 1; padding: 4px 0;
  background: #0c0c0c; border: 1px solid #242424;
  color: #484848; font-family: inherit; font-size: 8px;
  cursor: pointer; border-radius: 3px; letter-spacing: 0;
  transition: background 0.1s;
}
.btn-wave.active { background: #180f2c; border-color: #7744bb; color: #aa77ee; }

/* Filter sliders */
.filter-row { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
.filter-row input[type="range"] {
  flex: 1; height: 3px;
  -webkit-appearance: none; appearance: none;
  background: #222; border-radius: 2px; outline: none; cursor: pointer;
}
.filter-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 9px; height: 9px;
  border-radius: 50%; background: #6868BB; cursor: pointer;
}
.filter-val { font-size: 8px; color: #484848; width: 48px; text-align: right; flex-shrink: 0; }

/* Code button */
.btn-code {
  width: 100%; margin-top: 11px; padding: 5px 0;
  background: none; border: 1px solid #1e1e1e;
  color: #484848; font-family: inherit; font-size: 8px;
  letter-spacing: 2px; cursor: pointer; border-radius: 3px;
  transition: border-color 0.1s, color 0.1s;
}
.btn-code:hover { border-color: #3a3a3a; color: #888; }

/* ── Modal ── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 200;
  justify-content: center; align-items: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: #131313; border: 1px solid #333;
  border-radius: 8px; padding: 20px;
  width: 90%; max-width: 540px;
}
#modal-title { font-size: 9px; letter-spacing: 4px; color: #50BAB4; margin-bottom: 12px; }
#modal-code {
  background: #090909; border: 1px solid #222;
  border-radius: 4px; padding: 13px;
  font-size: 11px; line-height: 1.8; color: #bbb;
  white-space: pre; overflow: auto; max-height: 340px;
  user-select: all; cursor: text;
}
.modal-btns { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
.modal-btns button {
  padding: 7px 16px; font-family: inherit;
  font-size: 9px; letter-spacing: 2px;
  border-radius: 4px; cursor: pointer;
}
#btn-modal-copy { background: #1c1030; border: 1px solid #8844CC; color: #aa77ee; }
#btn-modal-copy:hover { background: #241440; }
#btn-modal-close { background: none; border: 1px solid #2a2a2a; color: #666; }
#btn-modal-close:hover { border-color: #444; color: #999; }
#copy-feedback {
  font-size: 8px; color: #3CC8A4; letter-spacing: 2px;
  opacity: 0; transition: opacity 0.3s; margin-left: 4px;
}
#copy-feedback.show { opacity: 1; }
</style>

// ─── STATE (per card: wave, hpFreq, lpFreq) ───────────────────────────────────
const STATE = {};

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let ac = null;
function getAC() {
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
  if (ac.state === 'suspended') ac.resume();
  return ac;
}

function playSound(sound, wave, hpFreq, lpFreq) {
  const a = getAC();

  // Build shared filter chain for this playback
  const hp = a.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = hpFreq; hp.Q.value = 0.5;
  const lp = a.createBiquadFilter();
  lp.type = 'lowpass';  lp.frequency.value = lpFreq; lp.Q.value = 0.5;
  hp.connect(lp); lp.connect(a.destination);

  sound.events.forEach(ev => {
    if (ev.k === 'tone') {
      const o = a.createOscillator();
      const g = a.createGain();
      o.type = wave;
      o.frequency.value = ev.f;
      const t = a.currentTime + (ev.delay || 0);
      g.gain.setValueAtTime(ev.gain, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + ev.dur);
      o.connect(g); g.connect(hp);
      o.start(t); o.stop(t + ev.dur + 0.05);
    } else if (ev.k === 'noise') {
      const secs = ev.dur;
      const buf = a.createBuffer(1, Math.ceil(a.sampleRate * secs), a.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
      const src = a.createBufferSource(); src.buffer = buf;
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = ev.f; bp.Q.value = ev.Q || 1.5;
      const g = a.createGain(); g.gain.value = ev.gain;
      src.connect(bp); bp.connect(g); g.connect(hp);
      src.start(a.currentTime + (ev.delay || 0));
    }
  });
}

// ─── CODE GENERATION ──────────────────────────────────────────────────────────
function n2s(n) {
  // Clean number → string: drop unnecessary trailing zeros
  return parseFloat(n.toPrecision(6)).toString();
}

function generateCode(sound, wave, hpFreq, lpFreq) {
  const lines = [];
  const useHP = hpFreq > 25;
  const useLP = lpFreq < 19000;

  if (useHP || useLP) {
    lines.push('// Filters active — HP: ' + Math.round(hpFreq) + ' Hz  LP: ' + Math.round(lpFreq) + ' Hz');
    lines.push('// A filter-aware wrapper will be needed in the game.');
    lines.push('');
  }

  sound.events.forEach(ev => {
    if (ev.k === 'tone') {
      const delay = ev.delay > 0 ? ', ' + n2s(ev.delay) : '';
      lines.push(`tone(${ev.f}, '${wave}', ${n2s(ev.dur)}, ${n2s(ev.gain)}${delay});`);
    } else if (ev.k === 'noise') {
      const q = ev.Q !== undefined ? ', ' + n2s(ev.Q) : '';
      lines.push(`noiseBurst(${ev.f}, ${n2s(ev.dur)}, ${n2s(ev.gain)}${q});`);
      if ((ev.delay || 0) > 0)
        lines[lines.length-1] = '// delay: ' + n2s(ev.delay) + 's — wrap in setTimeout if needed\n' + lines[lines.length-1];
    }
  });

  return lines.join('\n');
}

// ─── UI BUILDING ──────────────────────────────────────────────────────────────
const WAVES = ['sine', 'square', 'sawtooth', 'triangle'];
const WAVE_LABELS = { sine:'SIN', square:'SQR', sawtooth:'SAW', triangle:'TRI' };

function buildCard(sound) {
  STATE[sound.id] = { wave: sound.defaultWave, hpFreq: 20, lpFreq: 20000 };

  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + sound.id;

  card.innerHTML = `
    <div class="card-name">${sound.name}</div>
    <div class="card-desc">${sound.desc}</div>
    <button class="btn-play" data-id="${sound.id}">▶  PLAY</button>

    <span class="ctrl-label">WAVEFORM</span>
    <div class="wave-row" id="waves-${sound.id}">
      ${WAVES.map(w => `<button class="btn-wave${w === sound.defaultWave ? ' active' : ''}" data-id="${sound.id}" data-wave="${w}">${WAVE_LABELS[w]}</button>`).join('')}
    </div>

    <span class="ctrl-label">HI-PASS FILTER</span>
    <div class="filter-row">
      <input type="range" id="hp-${sound.id}" min="20" max="2000" step="10" value="20">
      <span class="filter-val" id="hpval-${sound.id}">OFF</span>
    </div>

    <span class="ctrl-label">LO-PASS FILTER</span>
    <div class="filter-row">
      <input type="range" id="lp-${sound.id}" min="1000" max="20000" step="100" value="20000">
      <span class="filter-val" id="lpval-${sound.id}">OFF</span>
    </div>

    <button class="btn-code" data-id="${sound.id}">{ } GET CODE</button>
  `;

  return card;
}

function buildSection(groupKey, containerId) {
  const container = document.getElementById(containerId);
  SOUNDS[groupKey].forEach(sound => container.appendChild(buildCard(sound)));
}

// ─── EVENT DELEGATION ─────────────────────────────────────────────────────────
// Flat map for quick lookup
const ALL_SOUNDS = {};
Object.values(SOUNDS).forEach(arr => arr.forEach(s => ALL_SOUNDS[s.id] = s));

let _playingCardId = null;

document.body.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;

  // Play
  if (btn.classList.contains('btn-play')) {
    const id = btn.dataset.id;
    const s = STATE[id];
    if (_playingCardId) document.getElementById('card-' + _playingCardId)?.classList.remove('playing');
    _playingCardId = id;
    document.getElementById('card-' + id).classList.add('playing');
    playSound(ALL_SOUNDS[id], s.wave, s.hpFreq, s.lpFreq);
    // Remove playing highlight after sound finishes (~1.5s generous buffer)
    const maxDelay = Math.max(...ALL_SOUNDS[id].events.map(ev => (ev.delay||0) + ev.dur));
    setTimeout(() => {
      if (_playingCardId === id) {
        document.getElementById('card-' + id)?.classList.remove('playing');
        _playingCardId = null;
      }
    }, (maxDelay + 0.3) * 1000);
  }

  // Waveform
  if (btn.classList.contains('btn-wave')) {
    const id = btn.dataset.id;
    STATE[id].wave = btn.dataset.wave;
    document.querySelectorAll(`#waves-${id} .btn-wave`).forEach(b => b.classList.toggle('active', b === btn));
  }

  // Code
  if (btn.classList.contains('btn-code')) {
    const id = btn.dataset.id;
    const s = STATE[id];
    const sound = ALL_SOUNDS[id];
    document.getElementById('modal-title').textContent = sound.name + '  —  CODE';
    document.getElementById('modal-code').textContent = generateCode(sound, s.wave, s.hpFreq, s.lpFreq);
    document.getElementById('modal-overlay').classList.add('open');
  }

  // Modal copy
  if (btn.id === 'btn-modal-copy') {
    const code = document.getElementById('modal-code').textContent;
    navigator.clipboard.writeText(code).then(() => {
      const fb = document.getElementById('copy-feedback');
      fb.classList.add('show');
      setTimeout(() => fb.classList.remove('show'), 1600);
    });
  }

  // Modal close
  if (btn.id === 'btn-modal-close') {
    document.getElementById('modal-overlay').classList.remove('open');
  }
});

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
});

// Filter sliders
document.body.addEventListener('input', e => {
  const el = e.target;
  if (el.tagName !== 'INPUT' || el.type !== 'range') return;

  const isHP = el.id.startsWith('hp-');
  const id = el.id.slice(3);
  const val = +el.value;

  if (isHP) {
    STATE[id].hpFreq = val;
    document.getElementById('hpval-' + id).textContent = val <= 20 ? 'OFF' : val + ' Hz';
  } else {
    STATE[id].lpFreq = val;
    document.getElementById('lpval-' + id).textContent = val >= 20000 ? 'OFF' : val + ' Hz';
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSection('hyp', 'grid-hyp');
buildSection('ls',  'grid-ls');
buildSection('lc',  'grid-lc');
</script>
