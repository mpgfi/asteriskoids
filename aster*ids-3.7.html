      drawHUD();
      if (state === 'dead' && Math.floor(ticker/22)%2===0)
        vText('SHIP DESTROYED', W/2, H/2, 22);
      // Level-start banner zoom-out overlay (plays over live gameplay)
      if (levelBannerAnimating && levelBannerT > 0) {
        const { s: _os, a: _oa } = _bannerSA();
        ctx.save(); ctx.globalAlpha = _oa;
        const _cy = H / 2;
        vText('LEVEL ' + level, W/2, _cy + (-47) * _os, 42 * _os, 'center', 1, PALETTE[0]);
        vText('READY PLAYER 1', W/2, _cy + (- 6) * _os, 19 * _os, 'center', 1, PALETTE[4]);
        vText('PRESS ANY KEY',  W/2, _cy + 41  * _os, 14 * _os);
        ctx.restore();
      }
    }

    vText('ASTER*IDS v' + VERSION, 8, H - 8, 10, 'left', 0.20);

    // Bloom: blur and stack copies of the frame in the glow canvas using the 2D canvas
    // filter API. Canvas-based blur is clipped to the canvas bounds (unlike CSS filter
    // which bleeds outside the element), so there is no glow leak at screen edges.
    if (bloomEnabled) {
      glowCtx.clearRect(0, 0, W * dpr, H * dpr);
      glowCtx.filter = `blur(${bloomBlur * dpr}px)`;
      glowCtx.globalCompositeOperation = 'lighter';
      for (let p = 0; p < bloomPasses; p++) glowCtx.drawImage(canvas, 0, 0);
      glowCtx.filter = 'none';
      glowCtx.globalCompositeOperation = 'source-over';
    }

    update();
    last = ts;
  }
  requestAnimationFrame(loop);
}

// ============================================================
//  INPUT
// ============================================================
function _godSpawnUFO(type) {
  if (ufo) stopUFOSound();
  const side = Math.random() < 0.5 ? -30 : W + 30;
  const spd  = type === 'alien' ? 2.0 : 1.44;
  const big  = type === 'big';
  ufo = {
    x: side, y: 90 + Math.random() * (H - 180),
    vx: side < 0 ? spd : -spd, vy: 0,
    type, big,
    r: type === 'alien' ? 7 : big ? 21 : 11,
    fireTmr: big ? 110 : type === 'alien' ? 55 : 65,
    sinePhase: Math.random() * Math.PI * 2, color: '#ffffff', trail: [],
    ...(type === 'alien' ? {
      erraticPhase: Math.random() * Math.PI * 2, erraticAmp: 1.6 + Math.random() * 1.0,
      dirChangeTmr: 20 + Math.floor(Math.random() * 30),
    } : {}),
  };
  if (type === 'alien') startAlienSound(); else startUFOSound();
}
const WASD_MAP = { w:'ArrowUp', a:'ArrowLeft', s:'ArrowDown', d:'ArrowRight' };
window.addEventListener('keydown', e => {
  if (WASD_MAP[e.key]) keys[WASD_MAP[e.key]] = true;
  keys[e.key] = true;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Escape','Tab'].includes(e.key)) e.preventDefault();
  // Wake the AudioContext on first user gesture; the _musicTick retry loop
  // will pick it up and start scheduling notes on its next iteration (~200ms).
  if (ac && ac.state === 'suspended') ac.resume();

  // M — mute / unmute music by zeroing the gain bus (keeps scheduler running)
  if (e.key === 'm' || e.key === 'M') {
    _musicOn = !_musicOn;
    const g = musicBus();
    g.gain.cancelScheduledValues(audio().currentTime);
    g.gain.setValueAtTime(_musicOn ? 0.28 : 0, audio().currentTime);
    return;
  }

  // F — toggle fullscreen (skip in name entry so F is still usable as an initial)
  if ((e.key === 'f' || e.key === 'F') && state !== 'nameentry') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
    return;
  }

  // ° — toggle God Mode (dev spawn keys)
  if (e.key === '°') { godMode = !godMode; return; }

  // God Mode spawn keys (playing state only)
  if (godMode && state === 'playing') {
    if (e.key === 'i' || e.key === 'I') { spawnShieldPod(); return; }
    if (e.key === 'o' || e.key === 'O') { spawnUpgradePod(); return; }
    if (e.key === 'p' || e.key === 'P') { spawnHyperUpgradePod(); return; }
    if (e.key === 'k' || e.key === 'K') { stopMammothSound(); mammoth = mkMammoth(); startMammothSound(); return; }
    if (e.key === 'm' || e.key === 'M') { _godSpawnUFO('big');   return; }
    if (e.key === 'n' || e.key === 'N') { _godSpawnUFO('small'); return; }
    if (e.key === 'l' || e.key === 'L') { _godSpawnUFO('alien'); return; }
  }

  // Splash: any key skips to title (and wakes AudioContext)
  if (state === 'splash') { endSplash(); return; }

  // Name entry
  if (state === 'nameentry') {
    if (/^[A-Za-z]$/.test(e.key) && nameInput.length < 3) {
      nameInput += e.key.toUpperCase();
    } else if (e.key === 'Backspace') {
      nameInput = nameInput.slice(0, -1);
    } else if ((e.key === 'Enter' || e.key === ' ') && nameInput.length === 3) {
      insertScore(nameInput, score);
      submitGlobalScore(nameInput, score);
      if (score > hiScore) hiScore = score;
      nameRank = -1;          // clear pending flag before showing GAME OVER
      state = 'gameover';
      setTimeout(() => { if (state==='gameover') { state='title'; startAttractCycle(); } }, 3000);
    }
    return;
  }

  if (state === 'levelstart' && levelReady && !levelBannerAnimating) { beginPlay(); levelBannerAnimating = true; levelBannerT = 0; return; }

  // Any key starts game from attract/hiscores/globalscores screens
  if (state === 'hiscores' || state === 'globalscores' || state === 'attract') {
    if (_resetConfirm) {
      if (e.key === 'y' || e.key === 'Y') {
        scores = Array.from({length: 10}, () => ({name: 'AAA', score: 0}));
        hiScore = 0; saveScores(); _resetConfirm = false; _resetFlash = 120;
        attractTmr = setTimeout(() => {
          if (state !== 'hiscores') return;
          if (SUPABASE_URL) { state = 'globalscores'; fetchGlobalScores();
            attractTmr = setTimeout(() => { if (state === 'globalscores') startAttractPlay(); }, 5000);
          } else { startAttractPlay(); }
        }, 5000);
      } else if (e.key === 'n' || e.key === 'N' || e.key === 'Escape') {
        _resetConfirm = false;
        attractTmr = setTimeout(() => {
          if (state !== 'hiscores') return;
          if (SUPABASE_URL) { state = 'globalscores'; fetchGlobalScores();
            attractTmr = setTimeout(() => { if (state === 'globalscores') startAttractPlay(); }, 5000);
          } else { startAttractPlay(); }
        }, 5000);
      }
      return;
    }
    if (e.key === ' ') { clearTimeout(attractTmr); initGame(); return; }
    if ((e.key === 'r' || e.key === 'R') && state === 'hiscores' && _resetFlash <= 0) {
      clearTimeout(attractTmr); _resetConfirm = true; return;
    }
    return;
  }

  // TAB during gameplay → pause (any key resumes)
  if (e.key === 'Tab') {
    if (state === 'playing') {
      _pauseFrom = state;
      stopBeat(); stopUFOSound();
      state = 'paused';
      return;
    }
    if (state === 'paused') {
      state = _pauseFrom;
      startBeat();
      if (ufo) { if (ufo.type === 'alien') startAlienSound(); else startUFOSound(ufo.big); }
      return;
    }
  }

  // Any key resumes from paused
  if (state === 'paused') {
    state = _pauseFrom;
    startBeat();
    if (ufo) startUFOSound(ufo.big);
    return;
  }

  // Escape during a game session → pause and ask
  if (e.key === 'Escape') {
    const inGame = state === 'playing' || state === 'dead' ||
                   state === 'levelstart' || state === 'levelcomplete';
    if (inGame) {
      _quitFrom = state;
      stopBeat(); stopUFOSound();
      state = 'quitprompt';
      return;
    }
  }

  // Quit-prompt Y / N
  if (state === 'quitprompt') {
    if (e.key === 'y' || e.key === 'Y') {
      // Abandon game — back to title
      stopBeat(); stopUFOSound();
      asteroids = []; bullets = []; particles = []; popups = []; ufo = null; upgradePod = null; shieldPod = null; shieldActive = false;
      state = 'title';
      startAttractCycle();
    } else if (e.key === 'n' || e.key === 'N' || e.key === 'Escape') {
      // Resume
      state = _quitFrom;
      if (state === 'playing') startBeat();
      else if (state === 'dead') startBeat();
      if (ufo) { if (ufo.type === 'alien') startAlienSound(); else startUFOSound(ufo.big); }
    }
    return;
  }


  if (e.key === ' ') {
    if (state === 'title')         { clearTimeout(attractTmr); initGame(); }
    else if (state === 'hiscores') { clearTimeout(attractTmr); initGame(); }
    else if (state === 'gameover' && Date.now() - _gameOverTime > 1000) {
      if (nameRank >= 0) { state = 'nameentry'; }
      else { state = 'hiscores'; }
    }
  }
});
window.addEventListener('keyup', e => { if (WASD_MAP[e.key]) keys[WASD_MAP[e.key]] = false; keys[e.key] = false; });


// ============================================================
//  BOOT
// ============================================================
// Starfield — spread across circumscribed circle so corners stay covered at any rotation angle
const _STAR_R = Math.hypot(W, H) / 2;
const STARS = Array.from({length: 320}, () => ({
  x: W/2 + (Math.random() - 0.5) * _STAR_R * 2,
  y: H/2 + (Math.random() - 0.5) * _STAR_R * 2,
  r: Math.random() < 0.65 ? 0.6 : 1.1,
  phase: Math.random() * Math.PI * 2,
  speed: 0.018 + Math.random() * 0.045,
}));
function drawStars() {
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.rotate(starAngle);
  ctx.translate(-W/2, -H/2);
  STARS.forEach(s => {
    s.phase += s.speed;
    const alpha = Math.min(1, 0.30 + Math.abs(Math.sin(s.phase)) * 1.10);
    ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
    ctx.fillRect(s.x - s.r/2, s.y - s.r/2, s.r, s.r);
  });
  ctx.restore();
}

// Seed title screen asteroids (half speed)
for (let i=0;i<7;i++) {
  const a = mkAsteroid(Math.random()*W, Math.random()*H, 1+Math.floor(Math.random()*3));
  a.vx *= 0.5; a.vy *= 0.5;
  titleRocks.push(a);
}

fetchGlobalScores();
requestAnimationFrame(loop);
</script>
