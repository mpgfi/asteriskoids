<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHIRP UP — 16 Variants</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #08080e;
    color: #ccc;
    font-family: monospace;
    padding: 28px 20px 40px;
  }
  h1 { text-align: center; color: #ff9620; font-size: 15px; letter-spacing: 4px; margin-bottom: 6px; }
  .sub { text-align: center; color: #555; font-size: 10px; letter-spacing: 1px; margin-bottom: 28px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 640px;
    margin: 0 auto 28px;
  }
  button {
    background: #111118;
    border: 1px solid #2a2a3a;
    color: #888;
    font-family: monospace;
    font-size: 10px;
    line-height: 1.5;
    padding: 16px 8px 14px;
    cursor: pointer;
    border-radius: 3px;
    transition: border-color 0.08s, color 0.08s, background 0.08s;
    text-align: center;
    user-select: none;
  }
  button:hover { border-color: #ff9620; color: #ff9620; }
  button.flash { background: #ff9620; color: #000; border-color: #ff9620; }
  .num { display: block; font-size: 8px; color: #444; margin-bottom: 4px; letter-spacing: 1px; }
  .desc { display: block; font-size: 8px; color: #555; margin-top: 3px; }
  button.flash .num, button.flash .desc { color: #000; }
  .footer { text-align: center; color: #444; font-size: 9px; letter-spacing: 1px; }
</style>
</head>
<body>

<h1>CHIRP UP — 16 VARIANTS</h1>
<p class="sub">hold to rapid-fire · 83 ms interval</p>

<div class="grid" id="grid"></div>
<p class="footer">base: sine 200 → 920 hz · 65 ms</p>

<script>
let ctx = null;
function audio() {
  if (!ctx) ctx = new AudioContext();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

function sw(a, type, f0, f1, t, dur, vol) {
  const o = a.createOscillator(), g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(f1, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.02);
}

function swLP(a, type, f0, f1, t, dur, vol, lp) {
  const o = a.createOscillator(), filt = a.createBiquadFilter(), g = a.createGain();
  o.connect(filt); filt.connect(g); g.connect(a.destination);
  filt.type = 'lowpass'; filt.frequency.value = lp;
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(f1, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.02);
}

function ns(a, t, dur, vol, lp, hp) {
  const len = Math.ceil(a.sampleRate * (dur + 0.02));
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = a.createBufferSource();
  src.buffer = buf;
  let node = src;
  if (lp) { const f = a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp; node.connect(f); node=f; }
  if (hp) { const f = a.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; node.connect(f); node=f; }
  const g = a.createGain();
  node.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.start(t); src.stop(t + dur + 0.02);
}

const sounds = [
  {
    name: 'Base',
    desc: 'sine · 200→920 · 65ms',
    fn: (a, t) => sw(a, 'sine', 200, 920, t, 0.065, 0.11)
  },
  {
    name: 'Snappy',
    desc: 'sine · 200→920 · 40ms',
    fn: (a, t) => sw(a, 'sine', 200, 920, t, 0.040, 0.12)
  },
  {
    name: 'Drawn Out',
    desc: 'sine · 200→920 · 110ms',
    fn: (a, t) => sw(a, 'sine', 200, 920, t, 0.110, 0.10)
  },
  {
    name: 'High Peak',
    desc: 'sine · 200→1500 · 65ms',
    fn: (a, t) => sw(a, 'sine', 200, 1500, t, 0.065, 0.10)
  },
  {
    name: 'Low Root',
    desc: 'sine · 100→920 · 65ms',
    fn: (a, t) => sw(a, 'sine', 100, 920, t, 0.065, 0.12)
  },
  {
    name: 'Wider Sweep',
    desc: 'sine · 120→1200 · 80ms',
    fn: (a, t) => sw(a, 'sine', 120, 1200, t, 0.080, 0.11)
  },
  {
    name: 'Triangle',
    desc: 'triangle · 200→920 · 65ms',
    fn: (a, t) => sw(a, 'triangle', 200, 920, t, 0.065, 0.13)
  },
  {
    name: 'Soft Square',
    desc: 'square+LP · 200→920 · 65ms',
    fn: (a, t) => swLP(a, 'square', 200, 920, t, 0.065, 0.06, 1400)
  },
  {
    name: 'With Noise',
    desc: 'sine + noise burst',
    fn: (a, t) => { sw(a, 'sine', 200, 920, t, 0.065, 0.11); ns(a, t, 0.030, 0.04, 3000, 800); }
  },
  {
    name: 'Doubled',
    desc: 'two sines · detuned ±8hz',
    fn: (a, t) => { sw(a, 'sine', 196, 912, t, 0.065, 0.08); sw(a, 'sine', 204, 928, t, 0.065, 0.07); }
  },
  {
    name: 'Octave Layer',
    desc: 'sine + octave above',
    fn: (a, t) => { sw(a, 'sine', 200, 920, t, 0.065, 0.09); sw(a, 'sine', 400, 1840, t, 0.065, 0.04); }
  },
  {
    name: 'Staggered',
    desc: 'two chirps · 20ms apart',
    fn: (a, t) => { sw(a, 'sine', 200, 920, t, 0.055, 0.10); sw(a, 'sine', 220, 960, t + 0.020, 0.055, 0.07); }
  },
  {
    name: 'Punchy',
    desc: 'fast attack · noise hit',
    fn: (a, t) => { ns(a, t, 0.015, 0.08, 2500, 600); sw(a, 'sine', 200, 920, t + 0.010, 0.060, 0.11); }
  },
  {
    name: 'Soft & Warm',
    desc: 'sine+LP 1200 · louder',
    fn: (a, t) => swLP(a, 'sine', 200, 920, t, 0.090, 0.14, 1200)
  },
  {
    name: 'Double Speed',
    desc: 'sine · 200→920 · 32ms',
    fn: (a, t) => sw(a, 'sine', 200, 920, t, 0.032, 0.13)
  },
  {
    name: 'Plateau',
    desc: 'chirp → hold → fade',
    fn: (a, t) => {
      const o = a.createOscillator(), g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(200, t);
      o.frequency.exponentialRampToValueAtTime(920, t + 0.045);
      o.frequency.setValueAtTime(920, t + 0.045);
      g.gain.setValueAtTime(0.11, t);
      g.gain.setValueAtTime(0.09, t + 0.045);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.110);
      o.start(t); o.stop(t + 0.13);
    }
  },
];

const FIRE_INTERVAL = 83;
let holdInterval = null;
let activeBtn = null;

function stopHold() {
  clearInterval(holdInterval);
  holdInterval = null;
  if (activeBtn) { activeBtn.classList.remove('flash'); activeBtn = null; }
}

const grid = document.getElementById('grid');
sounds.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.innerHTML = `<span class="num">${String(i + 1).padStart(2, '0')}</span>${s.name}<span class="desc">${s.desc}</span>`;
  btn.addEventListener('mousedown', (e) => {
    e.preventDefault();
    stopHold();
    activeBtn = btn;
    const fire = () => {
      const a = audio();
      s.fn(a, a.currentTime);
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 70);
    };
    fire();
    holdInterval = setInterval(fire, FIRE_INTERVAL);
  });
  grid.appendChild(btn);
});

document.addEventListener('mouseup', stopHold);
document.addEventListener('mouseleave', stopHold);
</script>
</body>
</html>
