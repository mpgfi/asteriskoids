// Fit bezel to viewport (also called on fullscreenchange)
function applyScale() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const isFS = !!document.fullscreenElement;
  const scale = isFS
    ? Math.min(vw / W, vh / H)
    : Math.min((vw - 120) / (W + 32), (vh - 120) / (H + 30));
  const s = Math.max(0.4, scale);
  document.getElementById('bezel').style.transform = `scale(${s})`;
  document.getElementById('bezel').style.transformOrigin = 'center center';
}
applyScale();
window.addEventListener('resize', applyScale);
document.addEventListener('fullscreenchange', applyScale);

function hexToHsl(hex) {
  let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b); let h,s,l=(max+min)/2;
  if (max===min) { h=s=0; } else {
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){ case r:h=((g-b)/d+(g<b?6:0))/6;break; case g:h=((b-r)/d+2)/6;break; case b:h=((r-g)/d+4)/6;break; }
  }
  return [h*360,s*100,l*100];
}
function hslToHex(h,s,l) {
  h=((h%360)+360)%360; s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12; return l-a*Math.max(-1,Math.min(k-3,9-k,1)); };
  return '#'+[f(0),f(8),f(4)].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');
}
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
// Named hue centres: red, yellow, green, cyan, blue, purple, magenta
const PALETTE_HUES = [0, 55, 130, 185, 235, 270, 320];
// Generate 16 bright colours within ±35° of a centre hue
function generatePalette(centerHue) {
  const spread = 70;
  return Array.from({length: 16}, (_, i) => {
    const t = i / 15;
    const hue = centerHue - spread / 2 + t * spread;
    const sat = 88 + Math.sin(t * Math.PI) * 7;   // 81–95%, richest in the middle
    const lit = 60 + Math.sin(t * Math.PI) * 6;   // 54–66%, brightest in the middle
    return hslToHex(hue, sat, lit);
  });
}
let PALETTE = generatePalette(270);  // default: purple family
let currentPalette = [...PALETTE];
function rndColor() { return currentPalette[Math.floor(Math.random() * currentPalette.length)]; }
function shiftPaletteHue(_unused) {
  const base = PALETTE_HUES[Math.floor(Math.random() * PALETTE_HUES.length)];
  PALETTE = generatePalette(base + (Math.random() - 0.5) * 20);
  currentPalette = [...PALETTE];
}
function resetPalette() { PALETTE = generatePalette(270); currentPalette = [...PALETTE]; }

// ============================================================
//  VECTOR DRAWING — clean single-pass lines
// ============================================================
function vLine(x1, y1, x2, y2, _bright, color) {
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = color || PC;
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

function vPoly(pts, closed = true, _bright, color) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  if (closed) ctx.closePath();
  ctx.strokeStyle = color || PC;
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

function vDot(x, y, r, _bright, color) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.strokeStyle = color || PC;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}
function vAsterisk(x, y, r, color) {
  ctx.strokeStyle = color || PC;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const a = i * Math.PI / 3;
    ctx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r);
    ctx.lineTo(x - Math.cos(a)*r, y - Math.sin(a)*r);
  }
  ctx.stroke();
}

// ─── ARCADE VECTOR FONT ──────────────────────────────────────────────────

  A:'00 06 48 86 80:03 83',    B:'00 08 58 76 54 04:64 82 60 00',
  C:'88 08 00 80',             D:'00 08 58 85 83 50 00',
  E:'88 08 00 80:04 64',       F:'88 08 00:04 64',

// strip spaces, read digit pairs, flip y for canvas coords
const ARCADE_FONT = {};
for (const [ch, raw] of Object.entries(_AF_RAW)) {
  ARCADE_FONT[ch] = raw.split(':').map(seg => {
    const d = seg.replace(/\s+/g, '');
    const pts = [];
    for (let i = 0; i + 1 < d.length; i += 2) pts.push([+d[i], 8 - +d[i+1]]);
    return pts;
  }).filter(s => s.length >= 2);
}
function drawArcadeText(text, x, y, size, align, color) {
  size *= 0.5;
  const scale  = size / 8;
  const cw     = 10 * scale + 2;
  const str    = String(text).toUpperCase();
  const totalW = str.length * cw;
  const ox = align === 'right'  ? x - totalW
           : align === 'center' ? x - totalW / 2 : x;
  const oy = y - 4 * scale;
  ctx.strokeStyle = color || PC;
  ctx.lineWidth   = 1;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  for (let i = 0; i < str.length; i++) {
    const strokes = ARCADE_FONT[str[i]];
    if (!strokes) continue;
    const cx = ox + i * cw;
    for (const stroke of strokes) {
      ctx.beginPath();
      ctx.moveTo(cx + stroke[0][0] * scale, oy + stroke[0][1] * scale);
      for (let j = 1; j < stroke.length; j++)
        ctx.lineTo(cx + stroke[j][0] * scale, oy + stroke[j][1] * scale);
      ctx.stroke();
    }
  }
}
// ─────────────────────────────────────────────────────────────────────────
function vText(text, x, y, size = 24, align = 'center', bright, color) {
  if (bright !== undefined && bright !== 1) {
    ctx.save();
    ctx.globalAlpha *= bright;
    drawArcadeText(text, x, y, size, align, color);
    ctx.restore();
  } else {
    drawArcadeText(text, x, y, size, align, color);
  }
}

// Smoothly sample the main palette at t ∈ [0,1) with RGB lerp between adjacent colours
function paletteSample(t) {
  const n = PALETTE.length;
  const pos = (((t % 1) + 1) % 1) * n;
  const i = Math.floor(pos), f = pos - i;
  const [r1,g1,b1] = hexToRgb(PALETTE[i % n]);
  const [r2,g2,b2] = hexToRgb(PALETTE[(i + 1) % n]);
  return `rgb(${Math.round(r1+(r2-r1)*f)},${Math.round(g1+(g2-g1)*f)},${Math.round(b1+(b2-b1)*f)})`;
}

// Return all vector strokes for text as {pts,sx} without drawing, sx = mean x of stroke
function arcadeTextGetStrokes(text, x, y, size, align) {
  const sc = (size * 0.5) / 8, cw = 10 * sc + 2;
  const str = String(text).toUpperCase(), totalW = str.length * cw;
  const ox = align === 'right' ? x - totalW : align === 'center' ? x - totalW / 2 : x;
  const oy = y - 4 * sc;
  const out = [];
  for (let i = 0; i < str.length; i++) {
    const cs = ARCADE_FONT[str[i]]; if (!cs) continue;
    const cx = ox + i * cw;
    for (const s of cs) {
      const pts = s.map(([px,py]) => [cx + px*sc, oy + py*sc]);
      out.push({ pts, sx: pts.reduce((sum,[px])=>sum+px,0)/pts.length });
    }
  }
  return out;
}

// Draw text with a palette colour wave that travels along the stroke order.
// phase ∈ [0,1) advances over time to make the wave creep left→right.
function drawArcadeTextWave(text, x, y, size, align, phase) {
  const sc = (size * 0.5) / 8, cw = 10 * sc + 2;
  const str = String(text).toUpperCase(), totalW = str.length * cw;
  const ox = align === 'right' ? x - totalW : align === 'center' ? x - totalW / 2 : x;
  const oy = y - 4 * sc;
  let total = 0;
  for (const ch of str) { const s = ARCADE_FONT[ch]; if (s) total += s.length; }
  ctx.lineWidth = 1; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  let si = 0;
  for (let i = 0; i < str.length; i++) {
    const cs = ARCADE_FONT[str[i]]; if (!cs) continue;
    const cx = ox + i * cw;
    for (const s of cs) {
      ctx.strokeStyle = paletteSample(si / total - phase);
      ctx.beginPath();
      ctx.moveTo(cx + s[0][0]*sc, oy + s[0][1]*sc);
      for (let j = 1; j < s.length; j++) ctx.lineTo(cx + s[j][0]*sc, oy + s[j][1]*sc);
      ctx.stroke();
      si++;
    }
  }
}

function rot(px, py, a) {
  const c = Math.cos(a), s = Math.sin(a);
  return [px*c - py*s, px*s + py*c];
}

function xfPoly(pts, ox, oy, angle, bright = 1, color = null) {
  const xf = pts.map(([px,py]) => { const [rx,ry]=rot(px,py,angle); return [ox+rx,oy+ry]; });
  vPoly(xf, true, bright, color);
  return xf;
}

function _decodeBlast() {
  if (!_blastRaw || _blastBuffer) return;
  console.log('[blast] decoding…');
  ac.decodeAudioData(_blastRaw.slice(0))
    .then(buf => { _blastBuffer = buf; console.log('[blast] decoded ok, duration', buf.duration); })
    .catch(e => console.error('[blast] decode failed:', e));
}

function audio() {
  if (!ac) {
    ac = new (window.AudioContext || window.webkitAudioContext)();
    _decodeBlast(); // decode as soon as context is created
  }
  return ac;
}

// Master bus: dry + true convolution reverb
let _master = null;
function master() {
  const a = audio();
  if (_master) return _master;

  // Convolution reverb impulse: exponential decay for a smooth, natural room tail
  const secs = 3.0, rate = a.sampleRate;
  const ibuf = a.createBuffer(2, Math.ceil(rate * secs), rate);
  for (let c = 0; c < 2; c++) {
    const d = ibuf.getChannelData(c);
    for (let i = 0; i < d.length; i++)
      d[i] = (Math.random()*2-1) * Math.exp(-i / (rate * 1.8));
  }
  const conv = a.createConvolver(); conv.buffer = ibuf;
  const revWet = a.createGain(); revWet.gain.value = 1.10;

  const dry = a.createGain(); dry.gain.value = 0.75;
  _master = a.createGain(); _master.gain.value = 1;
  _master.connect(dry);    dry.connect(a.destination);
  _master.connect(conv);   conv.connect(revWet); revWet.connect(a.destination);
  return _master;
}

function tone(freq, type, dur, gain = 0.25, delay = 0) {
  try {
    const a = audio();
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(master());
    o.type = type; o.frequency.value = freq;
    const t = a.currentTime + delay;
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  } catch(e) {}
}

// Filtered noise burst: freq = bandpass centre Hz, dur = seconds, gain, Q sharpness
function noiseBurst(freq, dur, gain = 0.15, Q = 1.5, envDecay = true) {
  try {
    const a = audio();
    const samples = Math.ceil(a.sampleRate * dur);
    const buf = a.createBuffer(1, samples, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < samples; i++)
      d[i] = (Math.random()*2-1) * (envDecay ? (1 - i/samples) : 1);
    const src = a.createBufferSource();
    src.buffer = buf;
    const bp = a.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = Q;
    const g = a.createGain(); g.gain.value = gain;
    src.connect(bp); bp.connect(g); g.connect(master());
    src.start();
  } catch(e) {}
}

function noise(dur, gain = 0.08) {
  noiseBurst(400, dur, gain, 0.5);
}

function startAlienSound() {
  stopAlienSound();
  // Shuffle pool and pick 8 unique bass notes
  const pool = [..._ALIEN_SCALE].sort(() => Math.random() - 0.5);
  const notes = pool.slice(0, 8);
  const beatMs = (680 + Math.random() * 80) / 3.4; // ~275–290 BPM, slightly varied

      const osc = a.createOscillator(), filt = a.createBiquadFilter(), g = a.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      filt.type = 'lowpass'; filt.frequency.value = 620; filt.Q.value = 1.4;
      const dur = beatMs / 1000 * 0.70;
      g.gain.setValueAtTime(0, a.currentTime);
      g.gain.linearRampToValueAtTime(0.15, a.currentTime + 0.025);
      g.gain.setValueAtTime(0.11, a.currentTime + dur * 0.45);
      g.gain.linearRampToValueAtTime(0, a.currentTime + dur);
      osc.connect(filt); filt.connect(g); g.connect(master());
      osc.start(a.currentTime); osc.stop(a.currentTime + dur + 0.05);
      idx++;
    } catch(e) {}
    _alienSoundTmr = setTimeout(tick, beatMs);
  }
  tick();
}

    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(pk,  startTime + att);
    g.gain.linearRampToValueAtTime(sus, startTime + att + dec);
    g.gain.setValueAtTime(sus, relStart);
    g.gain.linearRampToValueAtTime(0,   relStart + rel);
    osc.connect(filt); filt.connect(g); g.connect(musicBus());
    osc.start(startTime); osc.stop(relStart + rel + 0.02);
  } catch(e) {}
}

// Like _musicNote but louder, brighter LP, and routed through the reverb master bus —
// used for fanfares so they feel present rather than background.
function _fanfareNote(freq, startTime, durSec, voice, lpfHz = 1100, gainMult = 1) {
  if (!freq) return;
  try {
    const a = audio();
    const osc = a.createOscillator(), filt = a.createBiquadFilter(), g = a.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    filt.type = 'lowpass';
    filt.frequency.value = lpfHz;
    filt.Q.value = 0.5;
    const vols = [0.09, 0.045, 0.065, 0.05]; // half original levels
    const pk  = (vols[voice] ?? 0.12) * gainMult;
    const sus = pk * 0.49;
    const att = 0.008, dec = 0.14, rel = 0.55;
    const relStart = Math.max(startTime + att + dec, startTime + durSec - rel);
    g.gain.setValueAtTime(0,   startTime);
    g.gain.linearRampToValueAtTime(pk,  startTime + att);
    g.gain.linearRampToValueAtTime(sus, startTime + att + dec);
    g.gain.setValueAtTime(sus, relStart);
    g.gain.linearRampToValueAtTime(0,   relStart + rel);
    osc.connect(filt); filt.connect(g); g.connect(master());
    osc.start(startTime); osc.stop(relStart + rel + 0.02);
  } catch(e) {}
}

// Scheduler: events have absolute beat positions, evIdx just walks the sorted array
const _ml = { running:false, loopStart:0, evIdx:0, timer:null, evts:null, beats:0, bps:1 };

function _musicTick() {
  if (!_ml.running) return;
  const a = audio();
  // Retry every 200 ms until the browser grants audio (autoplay policy)
  if (a.state === 'suspended') { _ml.timer = setTimeout(_musicTick, 200); return; }
  // Self-terminate as soon as we leave the attract cycle
  if (state !== 'title' && state !== 'hiscores' && state !== 'globalscores' && state !== 'attract') { _ml.running = false; return; }
  const LOOKAHEAD = 0.35, now = a.currentTime;
  if (_ml.loopStart === 0) _ml.loopStart = now;
  for (let guard = 0; guard < 500; guard++) {
    if (_ml.evIdx >= _ml.evts.length) {
      _ml.loopStart += _ml.beats / _ml.bps;
      _ml.evIdx = 0;
    }
    const [bs, bd, hz, voice] = _ml.evts[_ml.evIdx];
    const evTime = _ml.loopStart + bs / _ml.bps;
    if (evTime > now + LOOKAHEAD) break;
    _musicNote(hz * 0.5, Math.max(evTime, now), bd / _ml.bps * 0.92, voice);
    _ml.evIdx++;
  }
  _ml.timer = setTimeout(_musicTick, 80);
}

function startMusic() {
  if (_ml.running || !_musicOn) return;
  _ml.running = true; _ml.loopStart = 0; _ml.evIdx = 0;
  _musicTick();
}

function stopMusic() {
  _ml.running = false;
  clearTimeout(_ml.timer);
}

function playLevelClearFanfare() {
  // Option C · Whole Steps Up (parallel motion, octave +1, LPF 5750 Hz)
  // Db → Eb → F major parallel chords, last note fades at ~2.9 s
  const a = audio(), t0 = a.currentTime;
  [
    [0.000, 0.692, 554.3600, 3],
    [0.000, 0.692, 698.4600, 0],
    [0.000, 0.692, 830.6000, 1],
    [0.538, 0.692, 622.2600, 3],
    [0.538, 0.692, 784.0000, 0],
    [0.538, 0.692, 932.3200, 1],
    [1.077, 1.154, 698.4600, 3],
    [1.077, 1.154, 880.0000, 0],
    [1.077, 1.154, 1046.500, 1],
  ].forEach(([start, dur, hz, voice]) => _fanfareNote(hz, t0 + start, dur, voice, 5750, 0.7));
}

function mkAsteroid(x, y, size) {
  const n = 9 + Math.floor(Math.random()*5);
  const R = size===3 ? 40 : size===2 ? 22 : 10;
  const pts = Array.from({length:n}, (_,i) => {
    const a = (i/n)*Math.PI*2;
    const r = R*(0.6 + Math.random()*0.75);
    return [Math.cos(a)*r, Math.sin(a)*r];
  });
  const spd = Math.max(0.55, ((0.5 + Math.random()*0.8) * (4-size) * 0.55 + 0.2) * 0.75 * 0.9 * Math.pow(0.95, level - 1));
  const dir = Math.random()*Math.PI*2;
  return {
    x, y,
    vx: Math.cos(dir)*spd, vy: Math.sin(dir)*spd,
    rot: 0, rotV: (Math.random()-0.5)*0.045,
    size, pts, r: R*0.78, color: rndColor(),
  };
}

function mkMammoth() {
  const R = 240;  // 6× large-asteroid R=40
  const n = 15 + Math.floor(Math.random() * 5);   // normal 9–13 + 6
  const pts = Array.from({length: n}, (_, i) => {
    const a = (i / n) * Math.PI * 2;
    const r = R * (0.80 + Math.random() * 0.25);   // tighter range → less jagged
    return [Math.cos(a) * r, Math.sin(a) * r];
  });
  // Spawn at a random edge, aim at the ship's current position
  const side = Math.random();
  let x, y;
  if      (side < 0.25) { x = -R;     y = Math.random() * H; }
  else if (side < 0.50) { x = W + R;  y = Math.random() * H; }
  else if (side < 0.75) { x = Math.random() * W; y = -R; }
  else                  { x = Math.random() * W; y = H + R; }
  const tx = ship ? ship.x : W / 2, ty = ship ? ship.y : H / 2;
  const dir = Math.atan2(ty - y, tx - x);
  const spd = 0.35;
  return {
    x, y,
    vx: Math.cos(dir) * spd, vy: Math.sin(dir) * spd,
    rot: 0, rotV: (Math.random() - 0.5) * 0.006,
    r: R * 0.78,
    pts, hp: 150, hitFlashTmr: 0, hitJitterTmr: 0,
    color: rndColor(),
  };
}

function mkUFO() {
  const side = Math.random() < 0.5 ? -30 : W + 30;
  // Type selection: large UFO from level 2, small from level 4, alien from level 6.
  // Probability of each shifts toward smaller/rarer types as level grows.
  let type;
  if (level >= 6) {
    const alienChance = Math.min(0.18, 0.04 + (level - 6) * 0.014);
    const smallChance = Math.min(0.60, 0.20 + (level - 4) * 0.04);
    const r = Math.random();
    type = r < alienChance ? 'alien' : r < alienChance + smallChance ? 'small' : 'big';
  } else if (level >= 4) {
    const smallChance = Math.min(0.50, 0.15 + (level - 4) * 0.08);
    type = Math.random() < smallChance ? 'small' : 'big';
  } else {
    type = 'big';   // levels 2–3: large UFO only
  }
  const big = type === 'big';
  const spd = type === 'alien' ? 2.0 : 1.44;
  return {
    x: side, y: 90 + Math.random() * (H - 180),
    vx: side < 0 ? spd : -spd, vy: 0,
    type, big,
    r: type === 'alien' ? 7 : big ? 21 : 11,
    fireTmr: big ? 110 : type === 'alien' ? 55 : 65,
    sinePhase: Math.random() * Math.PI * 2,
    color: '#ffffff',
    trail: [],
    ...(type === 'alien' ? {
      erraticPhase:  Math.random() * Math.PI * 2,
      erraticAmp:    1.6 + Math.random() * 1.0,
      dirChangeTmr:  20 + Math.floor(Math.random() * 30),

}

function spawnUpgradePod() {

// Smoothly rotate pod velocity toward (desX, desY) by at most maxTurn rad/frame.
// Produces arc-shaped paths rather than instant direction changes.
function steerPod(pod, desX, desY) {
  const desA = Math.atan2(desY, desX);
  const curA = Math.atan2(pod.vy, pod.vx);
  let diff = desA - curA;
  if (diff >  Math.PI) diff -= 2 * Math.PI;
  if (diff < -Math.PI) diff += 2 * Math.PI;
  const newA = curA + Math.max(-0.065, Math.min(0.065, diff));
  pod.vx = Math.cos(newA) * pod.spd;
  pod.vy = Math.sin(newA) * pod.spd;
}

// ── Cannon heat gauge — 10 elliptical arcs, blue (cool) → magenta (hot) ──
// ~122×29 px footprint (step 6 → radii 7–61, scaleY 0.48). ctx.ellipse used
// so lineWidth is always true screen-pixels (unaffected by any scale transform).
const HEAT_COLORS = Array.from({length:10}, (_,i) => hslToHex(240 + i * (60/9), 100, 55));
const HEAT_MAX_R  = 7 + 9 * 6;     // outermost arc radius = 61
const HEAT_SY     = 0.48;          // vertical squish factor
function drawHeatGauge() {
  ctx.save();
  ctx.lineCap = 'round';
  // permanent faint marker showing where max heat sits
  ctx.globalAlpha = 1;
  ctx.lineWidth   = 1.2;
  ctx.strokeStyle = '#000088';
  ctx.beginPath();
  ctx.ellipse(W / 2, H, HEAT_MAX_R, HEAT_MAX_R * HEAT_SY, 0, Math.PI, 0, false);
  ctx.stroke();
  if (heat > 0 || heatCutoutTmr > 0) {
    for (let i = 0; i < 10; i++) {
      const r = 7 + i * 6;                              // radii 7, 13 … 61
      const isCutout = i === 9 && heatCutoutTmr > 0;
      let lw, alpha;
      if (isCutout) {
        if (heatCutoutTmr > 48) continue;               // extended lockout: no pulse yet
        const bright = Math.floor((48 - heatCutoutTmr) / 6) % 2 === 0;
        if (!bright) continue;
        lw = 3; alpha = 1;
      } else {
        const op = Math.max(0, Math.min(1, (heat - i * 0.1) / 0.1));
        if (op <= 0) continue;
        lw = 1.2; alpha = op;
      }
      ctx.globalAlpha = alpha;
      ctx.lineWidth   = lw;
      ctx.strokeStyle = HEAT_COLORS[i];
      ctx.beginPath();
      ctx.ellipse(W / 2, H, r, r * HEAT_SY, 0, Math.PI, 0, false);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawRings() {
  rings.forEach(r => {
    if (r.delay > 0 || r.r <= 0) return;
    ctx.globalAlpha = r.life * r.life;
    ctx.strokeStyle = r.color || 'white';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.stroke();
  });
  ctx.globalAlpha = 1;
}

    do { x=Math.random()*W; y=Math.random()*H; }
    while (Math.hypot(x-cx,y-cy) < 128);
    asteroids.push(mkAsteroid(x, y, 3));
  }
}

// ============================================================
//  ATTRACT MODE
// ============================================================
function startAttractCycle() {
  resetPalette();
  if (!_ml.running) {
    const trk = MUSIC_TRACKS[_musicTrackIdx % MUSIC_TRACKS.length];
    _musicTrackIdx++;
    _ml.evts = trk.evts; _ml.beats = trk.beats; _ml.bps = trk.bps;
    startMusic();
  }
  clearTimeout(attractTmr);
  // title (10 s) → hiscores (5 s) → globalscores (5 s) → attract gameplay (10 s) → repeat
  attractTmr = setTimeout(() => {
    if (state !== 'title') return;
    state = 'hiscores';
    attractTmr = setTimeout(() => {
      if (state !== 'hiscores') return;
      if (SUPABASE_URL) { state = 'globalscores'; fetchGlobalScores();
        attractTmr = setTimeout(() => { if (state === 'globalscores') startAttractPlay(); }, 5000);
      } else { startAttractPlay(); }
    }, 5000);
  }, 10000);
}

function startAttractPlay() {
  clearTimeout(attractTmr);
  state = 'attract';
  asteroids = []; bullets = []; particles = []; popups = [];
  for (let i=0;i<6;i++)
    asteroids.push(mkAsteroid(Math.random()*W, Math.random()*H, 1+Math.floor(Math.random()*3)));
  demoShip = { x:W/2, y:H/2, vx:0, vy:0, angle:0, angleVel:0, thrusting:false, alive:true };
  demoFireTmr = 40;
  attractTmr = setTimeout(() => { if (state === 'attract') { state='title'; startAttractCycle(); } }, 10000);
}

function updateDemoShip() {
  // Classify asteroids: danger zone (<180px) vs target (nearest beyond danger)
  const DANGER = 180, ENGAGE = 320;
  let threatAngle = null, threatDist = Infinity;
  let targetAngle = null, targetDist = Infinity;
  for (const a of asteroids) {
    const dx = a.x - demoShip.x, dy = a.y - demoShip.y;
    const d = Math.hypot(dx, dy);
    if (d < threatDist) { threatDist = d; threatAngle = Math.atan2(dy, dx); }
    if (d >= DANGER && d < targetDist) { targetDist = d; targetAngle = Math.atan2(dy, dx); }
  }
  let tgt;
  if (threatDist < DANGER) {
    // Steer directly away from the threat
    tgt = threatAngle + Math.PI + Math.PI/2;
  } else if (targetAngle !== null && targetDist < ENGAGE) {
    // Steer toward a reachable target
    tgt = targetAngle + Math.PI/2;
  } else if (targetAngle !== null) {
    // Far target: head toward it
    tgt = targetAngle + Math.PI/2;
  } else {
    tgt = demoShip.angle;
  }
  let diff = ((tgt - demoShip.angle) % (Math.PI*2) + Math.PI*3) % (Math.PI*2) - Math.PI;
  demoShip.angleVel += Math.sign(diff) * 0.007;
  demoShip.angleVel = Math.max(-0.09, Math.min(0.09, demoShip.angleVel));
  if (threatDist >= DANGER && targetAngle === null) demoShip.angleVel *= 0.72;
  demoShip.angle += demoShip.angleVel;
  // Thrust: always when evading danger; otherwise only when not close enough to shoot
  demoShip.thrusting = threatDist < DANGER || (targetAngle !== null && targetDist > 120);
  if (demoShip.thrusting) {
    const fa = demoShip.angle - Math.PI/2;
    demoShip.vx += Math.cos(fa)*0.09; demoShip.vy += Math.sin(fa)*0.09;
    const spd=Math.hypot(demoShip.vx,demoShip.vy);
    if (spd>5) { demoShip.vx*=5/spd; demoShip.vy*=5/spd; }
  }
  demoShip.vx*=0.991; demoShip.vy*=0.991;
  demoShip.x+=demoShip.vx; demoShip.y+=demoShip.vy; wrap(demoShip);
  // Fire when lined up on a target
  demoFireTmr--;
  if (demoFireTmr <= 0 && targetAngle !== null) {
    const fa   = demoShip.angle - Math.PI / 2;
    const perp = fa + Math.PI / 2;
    const side = _demoGunLeft ? -1 : 1;
    _demoGunLeft = !_demoGunLeft;
    bullets.push({
      x: demoShip.x + Math.cos(fa)*6 + Math.cos(perp)*9*side,
      y: demoShip.y + Math.sin(fa)*6 + Math.sin(perp)*9*side,
      vx: Math.cos(fa)*21.6 + demoShip.vx,
      vy: Math.sin(fa)*21.6 + demoShip.vy,
      life: 40, own: 'ship', col: '#ff73ed',
    });
    demoFireTmr = 12;
  }
}

// ============================================================
//  UPDATE
// ============================================================
function wrap(o) {
  // Standard toroidal wrap — keep coordinates in [0, W) × [0, H).
  // Combined with 3×3 ghost rendering in drawAsteroid this is seamless:
  // the object's position never jumps visually.
  o.x = ((o.x % W) + W) % W;
  o.y = ((o.y % H) + H) % H;
}

// Swept line-segment vs circle collision — tests the bullet's full trajectory
// each frame, preventing fast-moving bullets from tunnelling through targets.
function hitCircle(b, cx, cy, r) {
  if (Math.hypot(b.x-cx, b.y-cy) < r) return true;       // end-point test
  const x0=b.x-b.vx, y0=b.y-b.vy, dx=b.vx, dy=b.vy;    // start of segment
  const fx=x0-cx, fy=y0-cy, a=dx*dx+dy*dy;
  if (!a) return false;
  const bb=2*(fx*dx+fy*dy), c=fx*fx+fy*fy-r*r;
  const disc=bb*bb-4*a*c; if (disc<0) return false;
  const sq=Math.sqrt(disc), t1=(-bb-sq)/(2*a), t2=(-bb+sq)/(2*a);
  return (t1>=0&&t1<=1)||(t2>=0&&t2<=1);
}

// Wrap-aware bullet→circle hit: also tests the target's ghost copies near edges.
// Fixes missed hits on asteroids whose visual polygon straddles a screen boundary.
function hitCircleWrapped(b, cx, cy, r) {
  if (hitCircle(b, cx, cy, r)) return true;
  const ox = cx < 65 ? W : cx > W-65 ? -W : 0;
  const oy = cy < 65 ? H : cy > H-65 ? -H : 0;
  if (ox && hitCircle(b, cx+ox, cy,    r)) return true;
  if (oy && hitCircle(b, cx,    cy+oy, r)) return true;
  if (ox && oy && hitCircle(b, cx+ox, cy+oy, r)) return true;
  return false;
}

// Toroidal distance — handles ship/asteroid proximity across screen edges.
function wrapDist(x1, y1, x2, y2) {
  let dx = Math.abs(x1-x2), dy = Math.abs(y1-y2);
  if (dx > W/2) dx = W-dx;
  if (dy > H/2) dy = H-dy;
  return Math.hypot(dx, dy);
}

function update() {
  ticker++;

  // Particles run in all states
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= p.decay;
  });
  rings = rings.filter(r => r.life > 0);
  rings.forEach(r => {
    r.x += r.vx; r.y += r.vy;
    if (r.delay > 0) { r.delay--; return; }
    if (r.ease) {
      // Velocity-decay expansion: dr bleeds off each frame, giving an unmistakable slowdown
      r.dr  *= 0.93;
      r.r    = Math.min(r.maxR, r.r + r.dr);
      r.t    = Math.min(1, r.t + 1 / (r.frames || 56));  // drives fade-out independently
      r.life = Math.max(0, 1 - r.t);
    } else {
      r.r += r.maxR / (r.frames || 56);
      r.life = Math.max(0, 1 - r.r / r.maxR);
    }
  });
  popups = popups.filter(p => p.life > 0);
  popups.forEach(p => { p.y -= 0.5; p.life -= 0.016; });

  // Combo multiplier: hold 2 s then rapid countdown to zero
  if (state === 'playing') {
    if (levelGraceTmr > 0) levelGraceTmr--;
    if (comboTmr > 0) { comboTmr--; }
    else if (combo > 0) {
      const prev = combo;
      combo = Math.max(0, Math.round((combo - 0.1) * 100) / 100);
      if (combo === 0 && prev > 0) { comboZeroAnim = 15; SFX.comboBoop(); }
    }
  }

  if (state === 'title' || state === 'hiscores' || state === 'globalscores') {
    titleRocks.forEach(a => { a.x+=a.vx; a.y+=a.vy; a.rot+=a.rotV; wrap(a); });
    return;
  }

  if (state === 'attract') {
    if (asteroids.length === 0) {
      for (let i=0;i<6;i++) asteroids.push(mkAsteroid(Math.random()*W, Math.random()*H, 1+Math.floor(Math.random()*3)));
      demoShip.x=W/2; demoShip.y=H/2; demoShip.vx=0; demoShip.vy=0;
    }
    asteroids.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotV;wrap(a);});
    bullets=bullets.filter(b=>b.life>0);
    bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;wrap(b);});
    updateDemoShip();
    // Demo bullets vs asteroids (split/destroy, no scoring)
    for (let bi=bullets.length-1;bi>=0;bi--) {
      const b=bullets[bi];
      for (let ai=asteroids.length-1;ai>=0;ai--) {
        const a=asteroids[ai];
        if (hitCircleWrapped(b, a.x, a.y, a.r)) {
          burst(a.x,a.y,8+a.size*5,2+a.size,a.color);
          spawnRings(a.x,a.y,a.r,a.color,a.vx,a.vy);
          if (a.size>1) {
            const off=a.r*0.4;
            asteroids.push(mkAsteroid(a.x+(Math.random()-.5)*off,a.y+(Math.random()-.5)*off,a.size-1));
            asteroids.push(mkAsteroid(a.x+(Math.random()-.5)*off,a.y+(Math.random()-.5)*off,a.size-1));
          }
          asteroids.splice(ai,1); b.life=0; break;
        }
      }
    }
    return;
  }

  // Heat keeps cooling during death / level-end / game-over
  if (state === 'dead' || state === 'levelcomplete' || state === 'gameover') {
    if (heatCutoutTmr > 0) heatCutoutTmr--;
    else heat = Math.max(0, heat - (heat > 0.5 ? 0.008 : 0.024));
  }
  // Level banner animations
  if (state === 'levelcomplete' || state === 'levelstart') {
    if (levelBannerInT < 1) levelBannerInT = Math.min(1, levelBannerInT + 1 / 30); // 0.5 s zoom-in
  }
  if (levelBannerAnimating) {
    levelBannerT = Math.min(1, levelBannerT + 1 / 45);  // 0.75 s zoom-out
    if (levelBannerT >= 1) {
      levelBannerAnimating = false;
      if (state === 'levelstart' || state === 'playing') { /* already playing */ }
      else if (state === 'levelcomplete') { clearTimeout(_levelCompleteTmr); level++; beatSpeed = 800; startLevelIntro(); }
    }
  }
  if (state === 'splash' || state === 'gameover' || state === 'dead' || state === 'levelstart' || state === 'nameentry' || state === 'levelcomplete' || state === 'quitprompt' || state === 'paused') return;
  levelTimer = Math.max(0, levelTimer - 1/60);

  // ── Ship controls ──
  if (ship.alive) {
    // Rotation: accelerate while key held, quick decel (~0.2 s) on release
    const rotL = !!keys['ArrowLeft'], rotR = !!keys['ArrowRight'];
    if (rotL) ship.angleVel -= 0.0045;
    if (rotR) ship.angleVel += 0.0045;
    ship.angleVel = Math.max(-0.08, Math.min(0.08, ship.angleVel));
    if (!rotL && !rotR) ship.angleVel *= 0.878;    // decel to ~2% in 30 frames (~0.5 s)
    ship.angle += ship.angleVel;
    ship.thrusting = !!keys['ArrowUp'];
    if (ship.thrusting) {
      const fa = ship.angle - Math.PI/2;
      ship.vx += Math.cos(fa)*0.12; ship.vy += Math.sin(fa)*0.12;
      const spd = Math.hypot(ship.vx, ship.vy);
      if (spd > 9) { ship.vx *= 9/spd; ship.vy *= 9/spd; }
      if (Math.random() < 0.45) {
        noiseBurst(36, 0.16, 0.32, 0.30);  // sub-bass rumble
        noiseBurst(72, 0.12, 0.18, 0.70);  // low-mid body
      }
    }
    // Hyperspace (max 3 per level)
    if (keys['ArrowDown'] && !ship._hyp && hypLeft > 0) {
      hypLeft--;
      ship._hyp = true;
      ship.x = 60 + Math.random()*(W-120); ship.y = 60 + Math.random()*(H-120);
      ship.vx = 0; ship.vy = 0;
      invTmr = 90;
      burst(ship.x, ship.y, 20, 4, '#8844CC');
      tone(200,'sawtooth',0.3,0.3); tone(400,'sawtooth',0.2,0.2,0.15);
    }
    if (!keys['ArrowDown']) ship._hyp = false;

    // Fire — eased heat buildup; non-linear cooldown; cutout at 100%
    const firing = !!(keys[' '] || keys['Space']) && _fireLock <= 0;
    // Pending upgrades activate the moment the player releases and re-presses space
    if (!firing) {
      if (_upgradePending)      { upgradeActive = true; upgradeTmr = 360; _upgradeGunLeft = false; _upgradePending = false; }
      if (_hyperUpgradePending) { hyperUpgradeActive = true; hyperUpgradeTmr = 600; _hyperUpgradePending = false; }
    }
    if (heatCutoutTmr > 0) {
      heatCutoutTmr--;                          // tick cutout animation; heat locked at 1
    } else if (heatWasCut) {
      // penalty cooldown: full speed resumes once below 50%
      heat = Math.max(0, heat - (heat > 0.5 ? 0.008 : 0.024));
      if (heat < 0.5) heatWasCut = false;
    } else if (firing) {
      // buildup: linear 0→0.5, eased 0.5→1
      const base = (upgradeActive || hyperUpgradeActive) ? 0.006 : 0.020;
      heat = Math.min(1, heat + (heat < 0.5 ? base : Math.max(0.0002, base * 2 * (1 - heat))));
      if (heat >= 1) {
        heat = 1; heatCutoutTmr = 108; heatWasCut = true;
        // four rapid soft beeps
        for (let i = 0; i < 4; i++) tone(880, 'sine', 0.06, 0.06, i * 0.09);
      }
    } else {
      // cooldown: linear 1→0.5, fast 0.5→0
      heat = Math.max(0, heat - (heat > 0.5 ? 0.008 : 0.024));
    }
    if (firing && fireTmr <= 0 && heatCutoutTmr === 0) {
      const fa  = ship.angle - Math.PI/2;
      const spd = 21.6;
      const perp = fa + Math.PI / 2;
      if (hyperUpgradeActive && hyperUpgradeTmr > 0) {
        // Each cannon fires 3 streams (straight + ±10°) — 6 bullets total
        [-1, 1].forEach(side => {
          [-10, 0, 10].forEach(deg => {
            const spread = deg * Math.PI / 180;
            bullets.push({
              x: ship.x + Math.cos(fa)*9 + Math.cos(perp)*13*side,
              y: ship.y + Math.sin(fa)*9 + Math.sin(perp)*13*side,
              vx: Math.cos(fa + spread)*spd + ship.vx,
              vy: Math.sin(fa + spread)*spd + ship.vy,
              life: 41, own: 'ship', col: '#ff73ed',
            });
          });
        });
      } else if (upgradeActive && upgradeTmr > 0) {
        // Both cannons fire simultaneously, each with slight outward spread
        [-1, 1].forEach(side => {
          const spread = side * 5 * Math.PI / 180;
          bullets.push({
            x: ship.x + Math.cos(fa)*9 + Math.cos(perp)*13*side,
            y: ship.y + Math.sin(fa)*9 + Math.sin(perp)*13*side,
            vx: Math.cos(fa + spread)*spd + ship.vx,
            vy: Math.sin(fa + spread)*spd + ship.vy,
            life: 41, own: 'ship', col: '#ff73ed',
          });
        });
      } else {
        // Alternating left/right cannon from gun barrel tips
        const side = _upgradeGunLeft ? -1 : 1;
        _upgradeGunLeft = !_upgradeGunLeft;
        bullets.push({
          x: ship.x + Math.cos(fa)*6 + Math.cos(perp)*9*side,
          y: ship.y + Math.sin(fa)*6 + Math.sin(perp)*9*side,
          vx: Math.cos(fa)*spd + ship.vx, vy: Math.sin(fa)*spd + ship.vy,
          life: 41, own: 'ship', col: '#ff73ed',
        });
      }
      SFX.fire();
      // 0–80%: full speed (5); 80–99%: ramp to 8× (40); penalty: fixed 8×
      const rawTmr = heatWasCut ? 40
        : heat < 0.8 ? 5
        : Math.round(5 + ((heat - 0.8) / 0.19) * 35);
      const baseTmr = Math.max(2, Math.round(rawTmr / 2));
      fireTmr = (upgradeActive || hyperUpgradeActive) ? Math.max(1, Math.round(baseTmr / 2)) : baseTmr;
    }

    ship.vx *= 0.991; ship.vy *= 0.991;
    ship.x += ship.vx; ship.y += ship.vy;
    wrap(ship);
  }

  if (fireTmr > 0) fireTmr--;
  if (_fireLock > 0) _fireLock--;
  if (invTmr  > 0) invTmr--;
  if (upgradeTmr > 0) { upgradeTmr--; if (upgradeTmr === 0) upgradeActive = false; }
  if (hyperUpgradeTmr > 0) { hyperUpgradeTmr--; if (hyperUpgradeTmr === 0) hyperUpgradeActive = false; }
  if (comboZeroAnim > 0) comboZeroAnim--;
  if (shieldTmr > 0) { shieldTmr--; if (shieldTmr === 0) { shieldActive = false; for (let _i=0;_i<4;_i++) tone(880,'sine',0.06,0.06,_i*0.09); } }

  // ── Asteroids ──
  asteroids.forEach(a => { a.x+=a.vx; a.y+=a.vy; a.rot+=a.rotV; wrap(a); });

  // ── Mammoth asteroid ──
  mammothSpawnTmr--;
  if (level >= 6 && !mammoth && mammothSpawnTmr <= 0 && levelGraceTmr <= 0) {
    mammoth = mkMammoth(); startMammothSound();
    // Next spawn: 2.5 min at L6, scales to 60 s at L22+, ±20% jitter
    const base = Math.max(3600, 9000 - (level - 6) * 300);
    mammothSpawnTmr = Math.round(base * (0.8 + Math.random() * 0.4));
  }
  if (mammoth) {
    mammoth.x += mammoth.vx; mammoth.y += mammoth.vy;
    mammoth.rot += mammoth.rotV;
    if (mammoth.hitFlashTmr > 0) mammoth.hitFlashTmr--;
    if (mammoth.hitJitterTmr > 0) mammoth.hitJitterTmr--;
    const mr = mammoth.r * 2;
    if (mammoth.x < -mr || mammoth.x > W + mr || mammoth.y < -mr || mammoth.y > H + mr) {
      stopMammothSound(); mammoth = null;
    }
  }

  // ── Bullets ──
  bullets = bullets.filter(b=>b.life>0);
  bullets.forEach(b => { b.x+=b.vx; b.y+=b.vy; b.life--; wrap(b); });

  // ── UFO / ALIEN ──
  // UFOs appear from level 2; spawn rate scales with level.
  ufoSpawnTmr -= 1;
  if (level >= 2 && !ufo && ufoSpawnTmr <= 0 && asteroids.length > 4 && levelGraceTmr <= 0) {
    ufo = mkUFO();
    if (ufo.type === 'alien') startAlienSound(); else startUFOSound(ufo.big);
    ufoSpawnTmr = Math.max(300, 700 - level * 25) + Math.random() * Math.max(150, 400 - level * 15);
  }
  if (ufo) {
    if (ticker % 6 === 0) {
      ufo.trail.push({ x: ufo.x, y: ufo.y });
      if (ufo.trail.length > 5) ufo.trail.shift();
    }
    ufo.x += ufo.vx; ufo.y += ufo.vy;
    if (ufo.type === 'alien') {
      // Erratic homing: steers toward player with compound sine wobble overlay.
      // vx/vy lerp toward a target derived from the player vector so it never escapes.
      ufo.sinePhase    += 0.048;
      ufo.erraticPhase += 0.075;
      const dxP = ship.alive ? (ship.x - ufo.x) : 0;
      const dyP = ship.alive ? (ship.y - ufo.y) : 0;
      const targetVx = Math.max(-2.5, Math.min(2.5, dxP * 0.03))
                     + Math.sin(ufo.sinePhase * 0.7) * 0.9;
      const targetVy = Math.max(-2.5, Math.min(2.5, dyP * 0.03))
                     + Math.sin(ufo.erraticPhase) * ufo.erraticAmp * 0.55
                     + Math.sin(ufo.sinePhase * 1.6) * 0.7;
      ufo.vx += (targetVx - ufo.vx) * 0.06;
      ufo.vy += (targetVy - ufo.vy) * 0.06;
      const spd = Math.hypot(ufo.vx, ufo.vy);
      if (spd > 3.2) { ufo.vx *= 3.2 / spd; ufo.vy *= 3.2 / spd; }
    } else {
      // Standard UFO snake motion biased toward player y
      ufo.sinePhase += 0.032;
      const dyToPlayer = ship.alive ? (ship.y - ufo.y) : 0;
      const bias = Math.max(-1.0, Math.min(1.0, dyToPlayer * 0.012));
      ufo.vy = Math.sin(ufo.sinePhase) * 1.44 + bias;
    }
    ufo.fireTmr--;
    if (ufo.fireTmr <= 0) {
      const spread = ufo.type === 'alien' ? (Math.random() - 0.5) * 0.45 : 0;
      const aim = ufo.big
        ? Math.random() * Math.PI * 2
        : Math.atan2(ship.y - ufo.y, ship.x - ufo.x) + spread;
      const bspd = 1.65 + level * 0.15;
      bullets.push({ x:ufo.x, y:ufo.y, vx:Math.cos(aim)*bspd, vy:Math.sin(aim)*bspd, life:70, own:'ufo' });
      tone(ufo.big ? 1200 : 800, 'square', 0.06, 0.12);
      ufo.fireTmr = ufo.big ? 110 : ufo.type === 'alien' ? 55 : 65;
    }
    if (ufo.x < -80 || ufo.x > W+80 || ufo.y < -80 || ufo.y > H+80) {
      ufo = null; stopUFOSound();
    }
  }

  // ── UPGRADE POD ──
  if (!upgradePod) {
    upgradePodTmr--;
    if (upgradePodTmr <= 0 && asteroids.length > 0 && !hyperUpgradePod && levelGraceTmr <= 0) {
      // With ≤4 rocks the pod rarely shows — only 10% chance of spawning
      if (asteroids.length > 4 || Math.random() < 0.10) {
        spawnUpgradePod();
      }
      upgradePodTmr = 900 + Math.random() * 600;
    }
  } else {
    const pod = upgradePod;
    const cx = W / 2, cy = H / 2; // fixed orbit centre — screen centre

    pod.sinePhase += 0.038;
    pod.rot += pod.rotSpd;

    // Orange pixel trail — 2 sparks per frame
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: pod.x + (Math.random() - 0.5) * 5,
        y: pod.y + (Math.random() - 0.5) * 5,
        vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6,
        a: Math.random() * Math.PI * 2,
        life: 1.4 + Math.random() * 0.6,
        decay: 0.045 + Math.random() * 0.035,  // fades in ~16-32 frames
        len: 1.2, col: ORG,
      });
    }

    if (pod.phase === 'approach') {
      // Steer desired direction: radial-inward when far, blending to orbit-tangential as
      // the pod nears the orbit circle. The max-turn-per-frame cap in steerPod turns
      // this into a smooth curved arc rather than an instant direction change.
      const curA  = Math.atan2(pod.y - cy, pod.x - cx);
      const distC = Math.hypot(pod.x - cx, pod.y - cy);
      if (distC <= pod.orbitRadius + 4) {
        pod.orbitAngle = curA;
        pod.phase = 'orbit';
      } else {
        const t    = Math.min(1, (distC - pod.orbitRadius) / 180); // 1=far, 0=at orbit
        const desX = (cx - pod.x) / distC * t + (-Math.sin(curA) * pod.orbitDir) * (1 - t);
        const desY = (cy - pod.y) / distC * t + ( Math.cos(curA) * pod.orbitDir) * (1 - t);
        steerPod(pod, desX, desY);
        pod.x += pod.vx; pod.y += pod.vy;
      }
    } else if (pod.phase === 'orbit') {
      const angSpd = 0.0175 * pod.orbitDir; // matched to podSpd (−30%)
      pod.orbitAngle += angSpd;
      pod.orbitAngleTravelled += Math.abs(angSpd);
      const wobble = Math.sin(pod.sinePhase * 2.7) * 9 + Math.sin(pod.sinePhase * 0.9) * 4;
      const r = pod.orbitRadius + wobble;
      pod.x = cx + Math.cos(pod.orbitAngle) * r;
      pod.y = cy + Math.sin(pod.orbitAngle) * r;
      // Keep tangent velocity ready for exit (matched to pod.spd)
      pod._exitVx = -Math.sin(pod.orbitAngle) * pod.orbitDir * pod.spd;
      pod._exitVy =  Math.cos(pod.orbitAngle) * pod.orbitDir * pod.spd;
      if (pod.orbitAngleTravelled >= Math.PI * 6) {
        pod.phase = 'exit';
        pod.vx = pod._exitVx;   // seed exit with orbit tangent so steering starts smoothly
        pod.vy = pod._exitVy;
      }
    } else { // exit — steer from tangential to radial-outward as distance grows
      const curA  = Math.atan2(pod.y - cy, pod.x - cx);
      const distC = Math.hypot(pod.x - cx, pod.y - cy);
      const w     = Math.min(1, (distC - pod.orbitRadius) / 140); // 0=just left orbit, 1=far
      const desX  = (-Math.sin(curA) * pod.orbitDir) * (1 - w) + (pod.x - cx) / distC * w;
      const desY  = ( Math.cos(curA) * pod.orbitDir) * (1 - w) + (pod.y - cy) / distC * w;
      steerPod(pod, desX, desY);
      pod.x += pod.vx; pod.y += pod.vy;
      if (pod.x < -120 || pod.x > W + 120 || pod.y < -120 || pod.y > H + 120)
        upgradePod = null;
    }

    // Pod is collected by shooting it — see bullet collision loop below
  }

  // ── HYPER UPGRADE POD ──
  if (!hyperUpgradePod) {
    hyperUpgradePodTmr--;
    if (hyperUpgradePodTmr <= 0 && asteroids.length > 0 && level >= 4 && !upgradePod && levelGraceTmr <= 0) {
      spawnHyperUpgradePod();
      hyperUpgradePodTmr = 3600 + Math.random() * 2400;
    }
  } else {
    const pod = hyperUpgradePod;
    const cx = W / 2, cy = H / 2;
    pod.sinePhase += 0.038;
    pod.rot += pod.rotSpd;
    // Cyan pixel trail
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: pod.x + (Math.random() - 0.5) * 5,
        y: pod.y + (Math.random() - 0.5) * 5,
        vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6,
        a: Math.random() * Math.PI * 2,
        life: 0.7 + Math.random() * 0.3,
        decay: 0.09 + Math.random() * 0.07,
        len: 1.2, col: '#00FFFF',
      });
    }
    if (pod.phase === 'approach') {
      const curA  = Math.atan2(pod.y - cy, pod.x - cx);
      const distC = Math.hypot(pod.x - cx, pod.y - cy);
      if (distC <= pod.orbitRadius + 4) {
        pod.orbitAngle = curA; pod.phase = 'orbit';
      } else {
        const t    = Math.min(1, (distC - pod.orbitRadius) / 180);
        const desX = (cx - pod.x) / distC * t + (-Math.sin(curA) * pod.orbitDir) * (1 - t);
        const desY = (cy - pod.y) / distC * t + ( Math.cos(curA) * pod.orbitDir) * (1 - t);
        steerPod(pod, desX, desY);
        pod.x += pod.vx; pod.y += pod.vy;
      }
    } else if (pod.phase === 'orbit') {
      const angSpd = 0.0175 * pod.orbitDir;
      pod.orbitAngle += angSpd;
      pod.orbitAngleTravelled += Math.abs(angSpd);
      const wobble = Math.sin(pod.sinePhase * 2.7) * 9 + Math.sin(pod.sinePhase * 0.9) * 4;
      const r = pod.orbitRadius + wobble;
      pod.x = cx + Math.cos(pod.orbitAngle) * r;
      pod.y = cy + Math.sin(pod.orbitAngle) * r;
      pod._exitVx = -Math.sin(pod.orbitAngle) * pod.orbitDir * pod.spd;
      pod._exitVy =  Math.cos(pod.orbitAngle) * pod.orbitDir * pod.spd;
      if (pod.orbitAngleTravelled >= Math.PI * 6) {
        pod.phase = 'exit';
        pod.vx = pod._exitVx; pod.vy = pod._exitVy;
      }
    } else {
      const curA  = Math.atan2(pod.y - cy, pod.x - cx);
      const distC = Math.hypot(pod.x - cx, pod.y - cy);
      const w     = Math.min(1, (distC - pod.orbitRadius) / 140);
      const desX  = (-Math.sin(curA) * pod.orbitDir) * (1 - w) + (pod.x - cx) / distC * w;
      const desY  = ( Math.cos(curA) * pod.orbitDir) * (1 - w) + (pod.y - cy) / distC * w;
      steerPod(pod, desX, desY);
      pod.x += pod.vx; pod.y += pod.vy;
      if (pod.x < -120 || pod.x > W + 120 || pod.y < -120 || pod.y > H + 120)
        hyperUpgradePod = null;
    }
    // Collected by shooting — see bullet collision loop below
  }

  // ── SHIELD POD ──
  if (!shieldPod) {
    shieldPodTmr--;
    if (shieldPodTmr <= 0 && asteroids.length > 0 && !upgradePod && !hyperUpgradePod && levelGraceTmr <= 0) {
      if (asteroids.length > 4 || Math.random() < 0.10) spawnShieldPod();
      shieldPodTmr = 900 + Math.random() * 600;
    }
  } else {
    const pod = shieldPod;
    const cx = W / 2, cy = H / 2;
    pod.sinePhase += 0.038;
    pod.rot += pod.rotSpd;
    // Green pixel trail
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: pod.x + (Math.random() - 0.5) * 5, y: pod.y + (Math.random() - 0.5) * 5,
        vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6,
        a: Math.random() * Math.PI * 2,
        life: 1.4 + Math.random() * 0.6, decay: 0.045 + Math.random() * 0.035,
        len: 1.2, col: '#008800',
      });
    }
    if (pod.phase === 'approach') {
      const curA  = Math.atan2(pod.y - cy, pod.x - cx);
      const distC = Math.hypot(pod.x - cx, pod.y - cy);
      if (distC <= pod.orbitRadius + 4) { pod.orbitAngle = curA; pod.phase = 'orbit'; }
      else {
        const t    = Math.min(1, (distC - pod.orbitRadius) / 180);
        const desX = (cx - pod.x) / distC * t + (-Math.sin(curA) * pod.orbitDir) * (1 - t);
        const desY = (cy - pod.y) / distC * t + ( Math.cos(curA) * pod.orbitDir) * (1 - t);
        steerPod(pod, desX, desY); pod.x += pod.vx; pod.y += pod.vy;
      }
    } else if (pod.phase === 'orbit') {
      const angSpd = 0.0175 * pod.orbitDir;
      pod.orbitAngle += angSpd; pod.orbitAngleTravelled += Math.abs(angSpd);
      const wobble = Math.sin(pod.sinePhase * 2.7) * 9 + Math.sin(pod.sinePhase * 0.9) * 4;
      const r = pod.orbitRadius + wobble;
      pod.x = cx + Math.cos(pod.orbitAngle) * r; pod.y = cy + Math.sin(pod.orbitAngle) * r;
      pod._exitVx = -Math.sin(pod.orbitAngle) * pod.orbitDir * pod.spd;
      pod._exitVy =  Math.cos(pod.orbitAngle) * pod.orbitDir * pod.spd;
      if (pod.orbitAngleTravelled >= Math.PI * 6) { pod.phase = 'exit'; pod.vx = pod._exitVx; pod.vy = pod._exitVy; }
    } else {
      const curA  = Math.atan2(pod.y - cy, pod.x - cx);
      const distC = Math.hypot(pod.x - cx, pod.y - cy);
      const w     = Math.min(1, (distC - pod.orbitRadius) / 140);
      const desX  = (-Math.sin(curA) * pod.orbitDir) * (1 - w) + (pod.x - cx) / distC * w;
      const desY  = ( Math.cos(curA) * pod.orbitDir) * (1 - w) + (pod.y - cy) / distC * w;
      steerPod(pod, desX, desY); pod.x += pod.vx; pod.y += pod.vy;
      if (pod.x < -120 || pod.x > W + 120 || pod.y < -120 || pod.y > H + 120) shieldPod = null;
    }
  }

  // ── Collisions: ship bullets vs world ──
  for (let bi = bullets.length-1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (b.own !== 'ship') continue;

    // vs asteroids
    let hit = false;
    for (let ai = asteroids.length-1; ai >= 0; ai--) {
      const a = asteroids[ai];
      if (hitCircleWrapped(b, a.x, a.y, a.r)) {
        const pts = Math.round([0, 20, 50, 100][a.size] * (1 + (level - 1) * 0.05));
        const awarded = Math.round(pts * (1 + combo));
        score += awarded;
        combo = Math.min(5.0, Math.round((combo + 0.05) * 100) / 100);
        comboTmr = 120;
        if (score >= extraAt) { if (lives < 5) { lives++; _lifeAnim = { index: lives-1, frames: 144, type: 'gain' }; SFX.life(); } extraAt += extraStep; extraStep += 5000; }
        if (hiScore < score) hiScore = score;
        popups.push({ x: a.x, y: a.y, text: String(awarded), life: 1 });
        [SFX.smlBoom, SFX.medBoom, SFX.bigBoom][a.size-1]?.();
        burst(a.x, a.y, 8+a.size*5, 2+a.size, a.color);
        spawnRings(a.x, a.y, a.r, a.color, a.vx, a.vy);
        if (a.size > 1) {
          const off = a.r*0.4;
          asteroids.push(mkAsteroid(a.x+(Math.random()-.5)*off, a.y+(Math.random()-.5)*off, a.size-1));
          asteroids.push(mkAsteroid(a.x+(Math.random()-.5)*off, a.y+(Math.random()-.5)*off, a.size-1));
        }
        asteroids.splice(ai, 1);
        b.life = 0; hit = true; break;
      }
    }
    if (hit) continue;

    // vs UFO
    if (ufo && hitCircleWrapped(b, ufo.x, ufo.y, ufo.r)) {
      const pts = ufo.type === 'alien' ? 4000 : ufo.big ? 500 : 2000;
      const awardedUfo = Math.round(pts * (1 + combo));
      score += awardedUfo;
      combo = Math.min(2.0, Math.round((combo + 0.05) * 100) / 100);
      comboTmr = 120;
      if (hiScore < score) hiScore = score;
      if (score >= extraAt) { if (lives < 5) { lives++; SFX.life(); } extraAt += extraStep; extraStep += 5000; }
      popups.push({ x: ufo.x, y: ufo.y, text: String(awardedUfo), life: 1 });
      burst(ufo.x, ufo.y, 30, 4, ufo.color);
      SFX.medBoom();
      stopUFOSound(); ufo = null;
      b.life = 0;
    }

    // vs mammoth
    if (!hit && mammoth && b.life > 0 && hitCircleWrapped(b, mammoth.x, mammoth.y, mammoth.r)) {
      mammoth.hp--;
      mammoth.hitFlashTmr = 8;
      mammoth.hitJitterTmr = 3;
      tone(180, 'square', 0.04, 0.04);   // light thud per hit
      b.life = 0; hit = true;
      if (mammoth.hp <= 0) {
        const mammothPts = Math.round(3000 * (1 + combo));
        score += mammothPts;
        if (hiScore < score) hiScore = score;
        if (score >= extraAt) { if (lives < 5) { lives++; _lifeAnim = { index: lives-1, frames: 144, type: 'gain' }; SFX.life(); } extraAt += extraStep; extraStep += 5000; }
        popups.push({ x: mammoth.x, y: mammoth.y, text: String(mammothPts), life: 1 });
        burst(mammoth.x, mammoth.y, 60, 8, mammoth.color);
        spawnRings(mammoth.x, mammoth.y, mammoth.r, mammoth.color);
        SFX.bigBoom();
        const off = mammoth.r * 0.5;
        for (let i = 0; i < 6; i++)
          asteroids.push(mkAsteroid(
            mammoth.x + (Math.random() - 0.5) * off * 2,
            mammoth.y + (Math.random() - 0.5) * off * 2, 3));
        stopMammothSound(); mammoth = null;
        { const base = Math.max(3600, 9000 - (level - 6) * 300); mammothSpawnTmr = Math.round(base * (0.8 + Math.random() * 0.4)); }
      }
    }

    // vs upgrade pod — must be shot to collect
    if (!hit && upgradePod && b.life > 0) {
      const pod = upgradePod;
      if (Math.hypot(b.x - pod.x, b.y - pod.y) < pod.r + 6) {
        popups.push({ x: pod.x, y: pod.y, text: 'DUAL FIRE', life: 1, color: ORG });
        burst(pod.x, pod.y, 24, 4, '#FFFF00');
        spawnRings(pod.x, pod.y, pod.r * 2, '#FFFF00');
        SFX.medBoom();
        _upgradePending = true; heat = 0; fireTmr = 0;
        upgradePod = null;
        b.life = 0;
      }
    }

    // vs hyper upgrade pod — must be shot to collect
    if (!hit && hyperUpgradePod && b.life > 0) {
      const pod = hyperUpgradePod;
      if (Math.hypot(b.x - pod.x, b.y - pod.y) < pod.r + 6) {
        popups.push({ x: pod.x, y: pod.y, text: 'HYPER FIRE', life: 1, color: '#00FFFF' });
        burst(pod.x, pod.y, 24, 4, '#00FFFF');
        spawnRings(pod.x, pod.y, pod.r * 2, '#00FFFF');
        SFX.medBoom();
        _hyperUpgradePending = true; heat = 0; fireTmr = 0;
        hyperUpgradePod = null;
        b.life = 0;
      }
    }

    // vs shield pod — must be shot to collect
    if (!hit && shieldPod && b.life > 0) {
      const pod = shieldPod;
      if (Math.hypot(b.x - pod.x, b.y - pod.y) < pod.r + 6) {
        popups.push({ x: pod.x, y: pod.y, text: 'SHIELD', life: 1, color: '#008800' });
        burst(pod.x, pod.y, 24, 4, '#008800');
        spawnRings(pod.x, pod.y, pod.r * 2, '#008800');
        SFX.medBoom();
        shieldActive = true; shieldTmr = 600;
        shieldPod = null;
        b.life = 0;
      }
    }
  }

  // ── UFO bullets vs ship ──
  if (ship.alive && invTmr <= 0) {
    for (const b of bullets) {
      if (b.own !== 'ufo') continue;
      if (hitCircleWrapped(b, ship.x, ship.y, 10)) {
        if (shieldActive) { shieldActive = false; shieldTmr = 0; invTmr = 90; spawnRings(ship.x, ship.y, 20, '#008800'); b.life = 0; }
        else killShip();
        break;
      }
    }
  }

  // ── UFO body vs ship ──
  if (ufo && ship.alive && invTmr <= 0) {
    if (wrapDist(ufo.x, ufo.y, ship.x, ship.y) < ufo.r + 9) {
      if (shieldActive) { shieldActive = false; shieldTmr = 0; invTmr = 90; spawnRings(ship.x, ship.y, 20, '#008800'); }
      else killShip();
    }
  }

  // ── Asteroids vs ship ──
  if (ship.alive && invTmr <= 0) {
    for (const a of asteroids) {
      if (wrapDist(a.x, a.y, ship.x, ship.y) < a.r + 9) {
        if (shieldActive) { shieldActive = false; shieldTmr = 0; invTmr = 90; spawnRings(ship.x, ship.y, 20, '#008800'); break; }
        else { killShip(); break; }
      }
    }
  }

  // ── Mammoth vs ship ──
  if (mammoth && ship.alive && invTmr <= 0) {
    if (Math.hypot(mammoth.x - ship.x, mammoth.y - ship.y) < mammoth.r + 9) {
      if (shieldActive) { shieldActive = false; shieldTmr = 0; invTmr = 90; spawnRings(ship.x, ship.y, 20, '#008800'); }
      else killShip();
    }
  }

  // ── Next level ──
  if (asteroids.length === 0 && !ufo && state === 'playing') {
    stopBeat(); stopUFOSound();
    bullets = [];
    upgradePod = null; upgradeActive = false; upgradeTmr = 0; _upgradeGunLeft = false;
    upgradePodTmr = 900 + Math.random() * 600;
    hyperUpgradePod = null; hyperUpgradeActive = false; hyperUpgradeTmr = 0;
    hyperUpgradePodTmr = 2400 + Math.random() * 1200;
    shieldPod = null; shieldPodTmr = 1200 + Math.random() * 600;
    stopMammothSound(); mammoth = null; mammothSpawnTmr = Math.round(Math.max(3600, 9000 - (level - 6) * 300) * (0.8 + Math.random() * 0.4));
    levelBonus = Math.round(levelTimer / 60 * (5000 + 200 * (level - 1)));
    score += levelBonus;
    if (hiScore < score) hiScore = score;
    burst(W/2, H/2, 25, 5, rndColor());
    burst(W/2, H/2, 25, 5, rndColor());
    playLevelClearFanfare();
    state = 'levelcomplete';
    levelBannerInT = 0; levelBannerT = 0; levelBannerAnimating = false;
    // After 3 s kick in the zoom-out; actual transition happens when animation finishes
    _levelCompleteTmr = setTimeout(() => {
      if (state === 'levelcomplete' && !levelBannerAnimating) { levelBannerAnimating = true; levelBannerT = 0; }
    }, 3000);
  }
}

function killShip() {
  burst(ship.x, ship.y, 40, 6, '#6898D0');
  spawnDeathRings(ship.x, ship.y, ship.vx, ship.vy);
  SFX.die();
  ship.alive = false;
  upgradeActive = false; upgradeTmr = 0;
  hyperUpgradeActive = false; hyperUpgradeTmr = 0;
  upgradePod = null; hyperUpgradePod = null; shieldPod = null;
  _upgradePending = false; _hyperUpgradePending = false;
  shieldActive = false; shieldTmr = 0;
  combo = 0; comboTmr = 0; comboZeroAnim = 0;
  if (ufo) { stopUFOSound(); ufo = null; }
  lives--;
  _lifeAnim = { index: lives, frames: 144, type: 'lose' };
  stopBeat();
  if (lives <= 0) {
    // Always show GAME OVER for 3 s, then branch to name entry or title.
    const goToName = qualifiesForBoard(score);
    if (goToName) { nameInput = ''; nameRank = scoreRank(score); }
    state = 'gameover'; _gameOverTime = Date.now();
    setTimeout(() => {
      if (state !== 'gameover') return;
      if (goToName) { state = 'nameentry'; } else { state = 'title'; startAttractCycle(); }
    }, 3000);
  } else {
    state = 'dead';
    setTimeout(() => {
      if (state !== 'dead') return;
      ship.x=W/2; ship.y=H/2; ship.vx=0; ship.vy=0; ship.angle=0; ship.angleVel=0; ship.alive=true;
      state='playing'; invTmr=200; fireTmr=0; heat=0;
      startBeat();
    }, 2800);
  }
}

// Draw asteroid with wrap-around (appear on opposite edges)
function drawAsteroid(a) {
  // Render at all 9 toroidal positions; canvas clips anything off-screen.
  // Eliminates wrap-edge "snap" glitches for any asteroid size or wrap-buffer width.
  for (let ox = -1; ox <= 1; ox++) {
    for (let oy = -1; oy <= 1; oy++) {
      const px = a.x + ox * W, py = a.y + oy * H;
      if (px > -80 && px < W+80 && py > -80 && py < H+80)
        xfPoly(a.pts, px, py, a.rot, 1, a.color);
    }
  }
}

function drawMammoth() {
  if (!mammoth) return;
  const col = mammoth.hitFlashTmr > 0 ? '#FFFFFF' : mammoth.color;
  const jx = mammoth.hitJitterTmr > 0 ? (Math.random() - 0.5) * 4 : 0;
  const jy = mammoth.hitJitterTmr > 0 ? (Math.random() - 0.5) * 4 : 0;
  xfPoly(mammoth.pts, mammoth.x + jx, mammoth.y + jy, mammoth.rot, 1, col);

  // Health bar: 50×3 px, centred on the asteroid
  const barW = 50, barH = 3;
  const bx = Math.round(mammoth.x - barW / 2);
  const by = Math.round(mammoth.y - barH / 2);
  ctx.save();
  ctx.strokeStyle = mammoth.color;
  ctx.lineWidth = 1;
  ctx.strokeRect(bx + 0.5, by + 0.5, barW, barH);
  const fill = Math.max(0, (mammoth.hp / 150) * barW);
  if (fill > 0) {
    ctx.fillStyle = mammoth.color;
    ctx.fillRect(bx + 1, by + 1, fill - 1, barH - 1);
  }
  ctx.restore();
}

function drawShip(s) {
  if (!s.alive) return;
  if (state !== 'attract' && invTmr > 0 && Math.floor(invTmr/5)%2===0) return;
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.angle);
  ctx.scale(1.05, 1.05);
  ctx.strokeStyle = PC; ctx.lineWidth = 1.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  function dp(pts, closed = true) {
    ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    if (closed) ctx.closePath(); ctx.stroke();
  }
  dp(SHIP_BODY); dp(SHIP_LEFT_WING); dp(SHIP_RIGHT_WING);
  dp(SHIP_LEFT_ENGINE); dp(SHIP_RIGHT_ENGINE); dp(SHIP_COCKPIT);
  // Wing-mounted gun barrels
  ctx.beginPath(); ctx.moveTo(-12.6, 1.0); ctx.lineTo(-12.6, -8.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 12.6, 1.0); ctx.lineTo( 12.6, -8.5); ctx.stroke();
  if (hyperUpgradeActive && hyperUpgradeTmr > 0) {
    const flash = hyperUpgradeTmr < 180 && Math.floor(hyperUpgradeTmr / 12) % 2 === 0;
    if (!flash) { ctx.strokeStyle = '#00FFFF'; dp([[0,-9],[6,0],[0,9],[-6,0]]); }
  } else if (upgradeActive && upgradeTmr > 0) {
    const flash = upgradeTmr < 180 && Math.floor(upgradeTmr / 12) % 2 === 0;
    if (!flash) { ctx.strokeStyle = ORG; dp([[0,-8],[5,5],[-5,5]]); }
  }
  if (s.thrusting) {
    ctx.strokeStyle = '#ff73ed'; ctx.lineWidth = 1.5;
    const drawFlame = (pts) => {
      ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
      pts.slice(1).forEach(([x,y]) => ctx.lineTo(x, y));
      ctx.stroke();
    };
    if (Math.random() > 0.25) drawFlame(FLAME_L(Math.random() * 10));
    if (Math.random() > 0.25) drawFlame(FLAME_R(Math.random() * 10));
  }
  ctx.restore();
}

// Alien geometry normalised from ALF.svg (viewBox 3628×1134, figure centre ~1799,640, scale 0.025)
function drawAlien(u) {
  const { x, y, color } = u;
  const o = (pts) => pts.map(([dx, dy]) => [x + dx, y + dy]);
  // Spiky star body
  vPoly(o([
    [-0.4,-9.1],[3.4,-8.4],[19.1,-11.4],[6.3,-1.3],[10.3,10.9],
    [0.0,0.0],[-10.2,10.9],[-6.3,-1.3],[-19.1,-12.1],[-3.9,-8.1],
  ]), true, 1, color);
  // Eyes (filled triangles)
  vPoly(o([[-9.4,-7.9],[-4.0,-4.8],[-7.2,-4.6]]), true, 1, color);

function drawUFO(u) {
  if (u.type === 'alien') { drawAlien(u); return; }
  const {x, y, big, color} = u;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(0.60, 0.60);
  ctx.translate(-x, -y);
  const sc = big ? 1 : 0.55;
  const w  = 34 * sc,   // wing half-span
        sw = 17 * sc,   // dome-shoulder half-width
        sh =  5 * sc,   // shoulder height above hull rim
        dh = 14 * sc,   // dome height above shoulder
        bw = 24 * sc,   // belly half-span
        bd =  8 * sc;   // belly depth below hull rim

  // ── Upper body: flat wings angling up to smooth dome arc ─────────
  // Hull rim is at y; shoulders at y-sh; dome peak at y-sh-dh
  const hull = [[x - w, y], [x - sw, y - sh]];
  for (let i = 0; i <= 14; i++) {
    const a = Math.PI * (1 - i / 14);          // π → 0 (left shoulder → peak → right shoulder)
    hull.push([x + Math.cos(a) * sw, (y - sh) - Math.sin(a) * dh]);
  }
  hull.push([x + sw, y - sh], [x + w, y]);
  vPoly(hull, true, 1, color);

  // ── Belly: smooth downward arc below hull rim ─────────────────────
  const belly = [];
  for (let i = 0; i <= 12; i++) {
    const t = i / 12;
    belly.push([x - bw + 2 * bw * t, y + Math.sin(t * Math.PI) * bd]);
  }
  vPoly(belly, false, 0.85, color);

  // ── Three dome panel stripes ──────────────────────────────────────
  // Positioned ~22% up into the dome, matching SVG panel line placement
  const psy = y - sh - dh * 0.22;
  const sl  = sw * 0.22;   // stripe half-length ≈ 3.7
  const gap = sw * 0.60;   // centre-to-centre spacing ≈ 10.2
  for (let i = -1; i <= 1; i++) {
    vLine(x + i * gap - sl, psy, x + i * gap + sl, psy, 0.7, color);
  }
  ctx.restore();
}

function _bannerSA() {
  // Returns {s, a} combining zoom-in (ease-out) and zoom-out (ease-in)
  if (levelBannerAnimating || levelBannerT > 0) {
    // zoom-out phase: ease-in cubic
    const et = Math.pow(levelBannerT, 3);
    return { s: 1 + et * 3, a: Math.max(0, 1 - levelBannerT) };
  }
  // zoom-in phase: ease-out cubic (fast start, slow end)
  const et = 1 - Math.pow(1 - levelBannerInT, 3);
  return { s: et, a: et };
}

function drawGameOver() {
  const newHi = score > 0 && score >= hiScore;
  drawArcadeText('GAME OVER', W/2, H/2-60, 51, 'center', '#FF00FF');
  vText('SCORE  '+score, W/2, H/2, 21);
  if (newHi && Math.floor(ticker/28)%2===0)
    vText('NEW HIGH SCORE!', W/2, H/2+49, 16);
  const sub = nameRank >= 0 ? 'HALL OF FAME — ENTER YOUR NAME' : 'RETURNING TO TITLE...';
  vText(sub, W/2, newHi ? H/2+93 : H/2+49, 11, 'center', 0.5);
}

// ============================================================
//  QUIT PROMPT
// ============================================================
let _quitFrom = null;   // state we came from when Escape was pressed
let _pauseFrom = null;  // state we came from when TAB was pressed

function drawPaused() {
  // Draw the frozen game scene underneath
  asteroids.forEach(drawAsteroid);
  if (ufo) drawUFO(ufo);
  bullets.forEach(drawBullet);
  drawParticles();
  drawShip(ship);
  drawHUD();
  // Dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  // Prompt
  vText('PAUSED', W/2, H/2 - 14, 42, 'center', 1, PALETTE[0]);
  vText('PRESS ANY KEY TO CONTINUE', W/2, H/2 + 34, 11, 'center', 0.55);
}

function drawQuitPrompt() {
  // Draw the frozen game scene underneath
  asteroids.forEach(drawAsteroid);
  if (ufo) drawUFO(ufo);
  bullets.forEach(drawBullet);
  drawParticles();
  drawShip(ship);
  drawHUD();
  // Dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  // Prompt
  vText('QUIT?', W/2, H/2 - 28, 42, 'center', 1, PALETTE[0]);
  vText('Y  /  N', W/2, H/2 + 34, 22, 'center', 0.55);
}

// ============================================================
//  MAIN LOOP
// ============================================================
let last = 0;
let starAngle = 0;
let starVel       = 1.0;   // current angular velocity, deg/s
let starTargetVel = 1.0;   // velocity we're drifting toward
let starVelTimer  = 180;   // frames until next target pick
const MENU_STATES = new Set(['splash','title','hiscores','globalscores','attract']);
function loop(ts) {
  if (ts - last >= 15.5) {
    const dt = Math.min(ts - last, 50);
    if (MENU_STATES.has(state)) {
      // Drift velocity toward target (lerp = gradual accel/decel)
      starVel += (starTargetVel - starVel) * 0.02;
      if (--starVelTimer <= 0) {
        const speed = 6 + Math.random() * 26;   // 6–32 deg/s
        starTargetVel = (Math.random() < 0.45 ? -1 : 1) * speed;
        starVelTimer  = 120 + Math.floor(Math.random() * 240); // 2–6 s at 60 fps
      }
    } else {
      // In-game: restore to the original constant 1 deg/s feel
      starVel = 1.0;
    }
    starAngle += starVel * dt / 1000 * Math.PI / 180;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,W,H);
    drawStars();

    if (state === 'splash') {
      drawSplash();
    } else if (state === 'title') {
      drawTitle();
    } else if (state === 'hiscores') {
      drawHiScores();
    } else if (state === 'globalscores') {
      drawGlobalScores();
    } else if (state === 'attract') {
      asteroids.forEach(drawAsteroid);
      if (demoShip) drawShip(demoShip);
      bullets.forEach(drawBullet);
      drawParticles();
      vText('DEMO', W/2, H/2, 42, 'center', 1, 'rgba(255,255,255,0.14)');
      if (Math.floor(ticker/30)%2===0) vText('PRESS SPACE TO PLAY', W/2, H-28, 12);
    } else if (state === 'nameentry') {
      drawNameEntry();
    } else if (state === 'levelcomplete') {
      drawLevelComplete();
    } else if (state === 'levelstart') {
      asteroids.forEach(drawAsteroid);
      drawHUD();
      const { s: _ls, a: _la } = _bannerSA();
      ctx.save();
      ctx.globalAlpha = _la;
      const _cy = H / 2;
      vText('LEVEL ' + level,  W/2, _cy + (-47) * _ls, 42 * _ls, 'center', 1, PALETTE[0]);
      vText('READY PLAYER 1',  W/2, _cy + (- 6) * _ls, 19 * _ls, 'center', 1, PALETTE[4]);
      // PRESS ANY KEY: blinks while waiting, locks on solid once zoom-out starts
      if (levelReady && (!levelBannerAnimating ? Math.floor(ticker/22)%2===0 : true))
        vText('PRESS ANY KEY', W/2, _cy + 41 * _ls, 14 * _ls);
      ctx.restore();
    } else if (state === 'gameover') {
      drawParticles();
      drawGameOver();
    } else if (state === 'paused') {
      drawPaused();
    } else if (state === 'quitprompt') {
      drawQuitPrompt();
    } else {
      // playing | dead
      asteroids.forEach(drawAsteroid);
      drawMammoth();
      drawRings();
      if (ufo) {
        ufo.trail.forEach((t, i) => {
          ctx.globalAlpha = (i + 1) * 0.05;
          drawUFO({ ...ufo, x: t.x, y: t.y });
        });
        ctx.globalAlpha = 1;
        drawUFO(ufo);
      }
      bullets.forEach(drawBullet);
      if (upgradePod) drawUpgradePod(upgradePod);
      if (hyperUpgradePod) drawHyperUpgradePod(hyperUpgradePod);
      if (shieldPod) drawShieldPod(shieldPod);
      drawParticles();
      drawPopups();
      drawShieldRing();
      drawShip(ship);
      drawHUD();
      if (state === 'dead' && Math.floor(ticker/22)%2===0)
        vText('SHIP DESTROYED', W/2, H/2, 22);
      // Level-start banner zoom-out overlay (plays over live gameplay)
      if (levelBannerAnimating && levelBannerT > 0) {
        const { s: _os, a: _oa } = _bannerSA();
        ctx.save(); ctx.globalAlpha = _oa;
        const _cy = H / 2;
        vText('LEVEL ' + level, W/2, _cy + (-47) * _os, 42 * _os, 'center', 1, PALETTE[0]);
        vText('READY PLAYER 1', W/2, _cy + (- 6) * _os, 19 * _os, 'center', 1, PALETTE[4]);
        vText('PRESS ANY KEY',  W/2, _cy + 41  * _os, 14 * _os);
        ctx.restore();
      }
    }

    vText('THANK HEAVENS v' + VERSION, 8, H - 8, 10, 'left', 0.20);

    // Bloom: blur and stack copies of the frame in the glow canvas using the 2D canvas
    // filter API. Canvas-based blur is clipped to the canvas bounds (unlike CSS filter
    // which bleeds outside the element), so there is no glow leak at screen edges.
    if (bloomEnabled) {
      glowCtx.clearRect(0, 0, W * dpr, H * dpr);
      glowCtx.filter = `blur(${bloomBlur * dpr}px)`;
      glowCtx.globalCompositeOperation = 'lighter';
      for (let p = 0; p < bloomPasses; p++) glowCtx.drawImage(canvas, 0, 0);
      glowCtx.filter = 'none';
      glowCtx.globalCompositeOperation = 'source-over';
    }

    update();
    last = ts;
  }
  requestAnimationFrame(loop);
}

// ============================================================
//  INPUT
// ============================================================
function _godSpawnUFO(type) {
  if (ufo) stopUFOSound();
  const side = Math.random() < 0.5 ? -30 : W + 30;
  const spd  = type === 'alien' ? 2.0 : 1.44;
  const big  = type === 'big';
  ufo = {
    x: side, y: 90 + Math.random() * (H - 180),
    vx: side < 0 ? spd : -spd, vy: 0,
    type, big,
    r: type === 'alien' ? 7 : big ? 21 : 11,
    fireTmr: big ? 110 : type === 'alien' ? 55 : 65,
    sinePhase: Math.random() * Math.PI * 2, color: '#ffffff', trail: [],
    ...(type === 'alien' ? {
      erraticPhase: Math.random() * Math.PI * 2, erraticAmp: 1.6 + Math.random() * 1.0,
      dirChangeTmr: 20 + Math.floor(Math.random() * 30),
    } : {}),
  };
  if (type === 'alien') startAlienSound(); else startUFOSound();
}
const WASD_MAP = { w:'ArrowUp', a:'ArrowLeft', s:'ArrowDown', d:'ArrowRight' };
window.addEventListener('keydown', e => {
  if (WASD_MAP[e.key]) keys[WASD_MAP[e.key]] = true;
  keys[e.key] = true;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Escape','Tab'].includes(e.key)) e.preventDefault();
  // Wake the AudioContext on first user gesture; the _musicTick retry loop
  // will pick it up and start scheduling notes on its next iteration (~200ms).
  if (ac && ac.state === 'suspended') ac.resume();

  // M — mute / unmute music by zeroing the gain bus (keeps scheduler running)
  if (e.key === 'm' || e.key === 'M') {
    _musicOn = !_musicOn;
    const g = musicBus();
    g.gain.cancelScheduledValues(audio().currentTime);
    g.gain.setValueAtTime(_musicOn ? 0.28 : 0, audio().currentTime);
    return;
  }

  // F — toggle fullscreen (skip in name entry so F is still usable as an initial)
  if ((e.key === 'f' || e.key === 'F') && state !== 'nameentry') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
    return;
  }

  // ° — toggle God Mode (dev spawn keys)
  if (e.key === '°') { godMode = !godMode; return; }

  // God Mode spawn keys (playing state only)
  if (godMode && state === 'playing') {
    if (e.key === 'i' || e.key === 'I') { spawnShieldPod(); return; }
    if (e.key === 'o' || e.key === 'O') { spawnUpgradePod(); return; }
    if (e.key === 'p' || e.key === 'P') { spawnHyperUpgradePod(); return; }
    if (e.key === 'k' || e.key === 'K') { stopMammothSound(); mammoth = mkMammoth(); startMammothSound(); return; }
    if (e.key === 'm' || e.key === 'M') { _godSpawnUFO('big');   return; }
    if (e.key === 'n' || e.key === 'N') { _godSpawnUFO('small'); return; }
    if (e.key === 'l' || e.key === 'L') { _godSpawnUFO('alien'); return; }
  }

  // Splash: any key skips to title (and wakes AudioContext)
  if (state === 'splash') { endSplash(); return; }

  // Name entry
  if (state === 'nameentry') {
    if (/^[A-Za-z]$/.test(e.key) && nameInput.length < 3) {
      nameInput += e.key.toUpperCase();
    } else if (e.key === 'Backspace') {
      nameInput = nameInput.slice(0, -1);
    } else if ((e.key === 'Enter' || e.key === ' ') && nameInput.length === 3) {
      insertScore(nameInput, score);
      submitGlobalScore(nameInput, score);
      if (score > hiScore) hiScore = score;
      nameRank = -1;          // clear pending flag before showing GAME OVER
      state = 'gameover';
      setTimeout(() => { if (state==='gameover') { state='title'; startAttractCycle(); } }, 3000);
    }
    return;
  }

  if (state === 'levelstart' && levelReady && !levelBannerAnimating) { beginPlay(); levelBannerAnimating = true; levelBannerT = 0; return; }

  // Any key starts game from attract/hiscores/globalscores screens
  if (state === 'hiscores' || state === 'globalscores' || state === 'attract') {
    if (_resetConfirm) {
      if (e.key === 'y' || e.key === 'Y') {
        scores = Array.from({length: 10}, () => ({name: 'AAA', score: 0}));
        hiScore = 0; saveScores(); _resetConfirm = false; _resetFlash = 120;
        attractTmr = setTimeout(() => {
          if (state !== 'hiscores') return;
          if (SUPABASE_URL) { state = 'globalscores'; fetchGlobalScores();
            attractTmr = setTimeout(() => { if (state === 'globalscores') startAttractPlay(); }, 5000);
          } else { startAttractPlay(); }
        }, 5000);
      } else if (e.key === 'n' || e.key === 'N' || e.key === 'Escape') {
        _resetConfirm = false;
        attractTmr = setTimeout(() => {
          if (state !== 'hiscores') return;
          if (SUPABASE_URL) { state = 'globalscores'; fetchGlobalScores();
            attractTmr = setTimeout(() => { if (state === 'globalscores') startAttractPlay(); }, 5000);
          } else { startAttractPlay(); }
        }, 5000);
      }
      return;
    }
    if (e.key === ' ') { clearTimeout(attractTmr); initGame(); return; }
    if ((e.key === 'r' || e.key === 'R') && state === 'hiscores' && _resetFlash <= 0) {
      clearTimeout(attractTmr); _resetConfirm = true; return;
    }
    return;
  }

  // TAB during gameplay → pause (any key resumes)
  if (e.key === 'Tab') {
    if (state === 'playing') {
      _pauseFrom = state;
      stopBeat(); stopUFOSound();
      state = 'paused';
      return;
    }
    if (state === 'paused') {
      state = _pauseFrom;
      startBeat();
      if (ufo) { if (ufo.type === 'alien') startAlienSound(); else startUFOSound(ufo.big); }
      return;
    }
  }

  // Any key resumes from paused
  if (state === 'paused') {
    state = _pauseFrom;
    startBeat();
    if (ufo) startUFOSound(ufo.big);
    return;
  }

  // Escape during a game session → pause and ask
  if (e.key === 'Escape') {
    const inGame = state === 'playing' || state === 'dead' ||
                   state === 'levelstart' || state === 'levelcomplete';
    if (inGame) {
      _quitFrom = state;
      stopBeat(); stopUFOSound();
      state = 'quitprompt';
      return;
    }
  }

  // Quit-prompt Y / N
  if (state === 'quitprompt') {
    if (e.key === 'y' || e.key === 'Y') {
      // Abandon game — back to title
      stopBeat(); stopUFOSound();
      asteroids = []; bullets = []; particles = []; popups = []; ufo = null; upgradePod = null; shieldPod = null; shieldActive = false;
      state = 'title';
      startAttractCycle();
    } else if (e.key === 'n' || e.key === 'N' || e.key === 'Escape') {
      // Resume
      state = _quitFrom;
      if (state === 'playing') startBeat();
      else if (state === 'dead') startBeat();
      if (ufo) { if (ufo.type === 'alien') startAlienSound(); else startUFOSound(ufo.big); }
    }
    return;
  }


  if (e.key === ' ') {
    if (state === 'title')         { clearTimeout(attractTmr); initGame(); }
    else if (state === 'hiscores') { clearTimeout(attractTmr); initGame(); }
    else if (state === 'gameover' && Date.now() - _gameOverTime > 1000) {
      if (nameRank >= 0) { state = 'nameentry'; }
      else { state = 'hiscores'; }
    }
  }
});
window.addEventListener('keyup', e => { if (WASD_MAP[e.key]) keys[WASD_MAP[e.key]] = false; keys[e.key] = false; });


// ============================================================
//  BOOT
// ============================================================
// Starfield — spread across circumscribed circle so corners stay covered at any rotation angle
const _STAR_R = Math.hypot(W, H) / 2;
const STARS = Array.from({length: 320}, () => ({
  x: W/2 + (Math.random() - 0.5) * _STAR_R * 2,
  y: H/2 + (Math.random() - 0.5) * _STAR_R * 2,
  r: Math.random() < 0.65 ? 0.6 : 1.1,
  phase: Math.random() * Math.PI * 2,
  speed: 0.018 + Math.random() * 0.045,
}));
function drawStars() {
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.rotate(starAngle);
  ctx.translate(-W/2, -H/2);
  STARS.forEach(s => {
    s.phase += s.speed;
    const alpha = Math.min(1, 0.30 + Math.abs(Math.sin(s.phase)) * 1.10);
    ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
    ctx.fillRect(s.x - s.r/2, s.y - s.r/2, s.r, s.r);
  });
  ctx.restore();
}

// Seed title screen asteroids (half speed)
for (let i=0;i<7;i++) {
  const a = mkAsteroid(Math.random()*W, Math.random()*H, 1+Math.floor(Math.random()*3));
  a.vx *= 0.5; a.vy *= 0.5;
  titleRocks.push(a);
}

fetchGlobalScores();
requestAnimationFrame(loop);
</script>
</body>
